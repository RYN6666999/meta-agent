<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM 人脈樹</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230d1117'/><circle cx='16' cy='9' r='4' fill='%23388bfd'/><circle cx='7' cy='24' r='3.5' fill='%233fb950'/><circle cx='25' cy='24' r='3.5' fill='%23d29922'/><line x1='16' y1='13' x2='16' y2='18' stroke='%23444c56' stroke-width='1.5'/><line x1='16' y1='18' x2='7' y2='21' stroke='%23444c56' stroke-width='1.5'/><line x1='16' y1='18' x2='25' y2='21' stroke='%23444c56' stroke-width='1.5'/></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Themes ── */
:root[data-theme="dark"]{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--surface3:#2d333b;
  --border:#30363d;--border-hover:#6e7681;
  --text:#e6edf3;--text-muted:#8b949e;--text-subtle:#6e7681;
  --canvas-dot:rgba(255,255,255,.06);
}
:root[data-theme="dark-blue"]{
  --bg:#090e1a;--surface:#0f1729;--surface2:#162033;--surface3:#1d2b40;
  --border:#253047;--border-hover:#3a4d6b;
  --text:#d4e4f7;--text-muted:#7a9bbf;--text-subtle:#4d6f96;
  --canvas-dot:rgba(100,150,220,.08);
}
:root[data-theme="light"]{
  --bg:#f6f8fa;--surface:#ffffff;--surface2:#f0f2f5;--surface3:#e8eaed;
  --border:#d0d7de;--border-hover:#8c959f;
  --text:#1f2328;--text-muted:#57606a;--text-subtle:#8c959f;
  --canvas-dot:rgba(0,0,0,.06);
}
:root[data-theme="light-warm"]{
  --bg:#faf8f5;--surface:#fffefb;--surface2:#f2ede6;--surface3:#e8e0d5;
  --border:#d8cfc4;--border-hover:#9e8f80;
  --text:#2c2416;--text-muted:#6b5c4a;--text-subtle:#9e8f80;
  --canvas-dot:rgba(80,60,30,.05);
}
:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#21262d;
  --surface3:#2d333b;
  --border:#30363d;
  --border-hover:#6e7681;
  --text:#e6edf3;
  --text-muted:#8b949e;
  --text-subtle:#6e7681;
  --canvas-dot:rgba(255,255,255,.06);
  --green:#3fb950;
  --green-bg:rgba(63,185,80,.13);
  --green-border:rgba(63,185,80,.3);
  --yellow:#d29922;
  --yellow-bg:rgba(210,153,34,.13);
  --yellow-border:rgba(210,153,34,.3);
  --red:#f85149;
  --red-bg:rgba(248,81,73,.13);
  --red-border:rgba(248,81,73,.3);
  --gray:#6e7681;
  --gray-bg:rgba(110,118,129,.13);
  --gray-border:rgba(110,118,129,.3);
  --accent:#388bfd;
  --accent-hover:#58a6ff;
  --purple:#bc8cff;
  --purple-bg:rgba(188,140,255,.13);
  --node-w:160px;
}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow:hidden}

/* ── Header ── */
.header{position:fixed;top:0;left:0;right:0;height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;z-index:200}
.header-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;white-space:nowrap}
.header-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.header-stats{font-size:12px;color:var(--text-muted);display:flex;gap:12px}
.stat{display:flex;align-items:center;gap:5px}
.stat-dot{width:7px;height:7px;border-radius:50%}
.header-actions{margin-left:auto;display:flex;gap:7px;flex-shrink:0}

/* ── Tab nav ── */
.tab-nav{display:flex;gap:2px;margin-left:8px}
.tab-btn{padding:5px 13px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap;position:relative}
.tab-btn:hover{color:var(--text);background:var(--surface2)}
.tab-btn.active{color:var(--text);background:var(--surface2);border-color:var(--border)}
.tab-badge{position:absolute;top:2px;right:4px;background:var(--red);color:#fff;border-radius:8px;font-size:9px;padding:1px 4px;min-width:14px;text-align:center;line-height:14px}

/* ── Buttons ── */
.btn{padding:5px 13px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-family:inherit;white-space:nowrap}
.btn:hover{border-color:var(--border-hover)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.btn-danger:hover{background:rgba(248,81,73,.22)}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-purple{background:var(--purple-bg);border-color:rgba(188,140,255,.3);color:var(--purple)}
.btn-purple:hover{background:rgba(188,140,255,.22)}

/* ── Pages ── */
.page{display:none;position:fixed;top:54px;left:0;right:0;bottom:0}

/* ── Canvas CRM Page ── */
#page-crm{overflow:hidden}
#canvas-container{overflow:hidden;position:relative;width:100%;height:100%;cursor:default;background:radial-gradient(circle at 1px 1px,var(--canvas-dot) 1px,transparent 0) 0 0/24px 24px,var(--bg)}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0;transform:translate(0px,0px) scale(1)}
#edges-svg{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;z-index:0;width:1px;height:1px}
#nodes-layer{position:relative;z-index:1}

/* ── Node ── */
.node-wrap{position:absolute;width:160px;user-select:none}
.node-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 11px 9px;cursor:default;transition:border-color .15s,box-shadow .15s;position:relative}
.node-wrap.selected .node-card{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,139,253,.18)}
.node-card:hover{border-color:var(--border-hover);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.node-drag-handle{position:absolute;top:4px;left:4px;color:var(--text-subtle);font-size:12px;cursor:grab;opacity:0;transition:opacity .15s;z-index:5;line-height:1}
.node-card:hover .node-drag-handle{opacity:1}
.node-header{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.node-avatar{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text-muted);flex-shrink:0}
.node-name{font-weight:600;font-size:13px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:color .1s}
.node-name:hover{color:var(--accent-hover)}
.status-pill{display:flex;align-items:center;justify-content:center;gap:5px;padding:4px 8px;border-radius:20px;cursor:pointer;transition:filter .15s;font-size:11px;font-weight:500;border:1px solid transparent;user-select:none;margin-bottom:6px}
.status-pill:hover{filter:brightness(1.15)}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.node-wrap.status-green .status-pill{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.node-wrap.status-green .status-dot{background:var(--green);animation:pulse 2s infinite}
.node-wrap.status-yellow .status-pill{background:var(--yellow-bg);border-color:var(--yellow-border);color:var(--yellow)}
.node-wrap.status-yellow .status-dot{background:var(--yellow)}
.node-wrap.status-red .status-pill{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.node-wrap.status-red .status-dot{background:var(--red)}
.node-wrap.status-gray .status-pill{background:var(--gray-bg);border-color:var(--gray-border);color:var(--gray)}
.node-wrap.status-gray .status-dot{background:var(--gray)}
.node-root-pill{display:flex;align-items:center;justify-content:center;padding:4px 8px;border-radius:20px;font-size:11px;font-weight:500;background:rgba(56,139,253,.13);border:1px solid rgba(56,139,253,.3);color:var(--accent);margin-bottom:6px}
.node-footer{display:flex;align-items:center;justify-content:space-between;gap:4px}
.node-meta{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.node-actions{display:flex;gap:3px;flex-shrink:0}
.act-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;line-height:1}
.act-btn:hover{border-color:var(--border-hover);color:var(--text)}
.act-btn.del:hover{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.collapse-btn{width:100%;margin-top:6px;padding:2px 6px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-subtle);font-size:10px;cursor:pointer;transition:all .15s;font-family:inherit;text-align:center}
.collapse-btn:hover{border-color:var(--border-hover);color:var(--text-muted)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Canvas Controls ── */
.canvas-controls{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;gap:4px;padding:4px 8px;z-index:50;font-size:12px}
.canvas-controls button{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
.canvas-controls button:hover{border-color:var(--border-hover)}
#zoom-label{color:var(--text-muted);min-width:38px;text-align:center;font-size:11px}
.shortcuts-hint{position:fixed;bottom:20px;left:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--text-muted);display:flex;gap:10px;z-index:50;pointer-events:none;flex-wrap:wrap;max-width:560px}
.shortcuts-hint kbd{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:10px;color:var(--text)}
/* ── Settings Page ── */
.settings-page{max-width:680px;margin:0 auto;padding:32px 24px;overflow-y:auto;height:100%}
.settings-title{font-size:20px;font-weight:700;margin-bottom:24px;color:var(--text)}
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:16px}
.settings-card-title{font-size:14px;font-weight:600;margin-bottom:6px}
.settings-card-desc{font-size:12px;color:var(--text-muted);margin-bottom:14px;line-height:1.5}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:4px}
.theme-tile{padding:14px 8px;border-radius:10px;border:2px solid var(--border);cursor:pointer;text-align:center;background:var(--surface2);transition:all .15s}
.theme-tile:hover{border-color:var(--border-hover)}
.theme-tile.active{border-color:var(--accent)}
.theme-tile-icon{font-size:24px;margin-bottom:6px}
.theme-tile-label{font-size:12px;color:var(--text-muted)}
/* Shortcuts settings modal */
.sk-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center}
.sk-modal.open{display:flex}
.sk-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:460px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
.sk-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;flex-shrink:0}
.sk-body{padding:16px 20px;overflow-y:auto;flex:1}
.sk-row{display:grid;grid-template-columns:1fr 160px;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.sk-row:last-child{border-bottom:none}
.sk-action{font-size:13px;color:var(--text)}
.sk-capture{padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:monospace;cursor:pointer;width:100%;text-align:center;transition:all .15s;user-select:none}
.sk-capture:hover{border-color:var(--border-hover)}
.sk-capture.listening{border-color:var(--accent);background:rgba(56,139,253,.1);color:var(--accent-hover);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.sk-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* ── Side Panel ── */
.side-panel{position:fixed;top:54px;right:0;bottom:0;width:380px;min-width:280px;max-width:680px;background:var(--surface);border-left:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;z-index:100;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.side-panel.open{transform:translateX(0)}
.panel-resize{position:absolute;left:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:10;background:transparent;transition:background .15s}
.panel-resize:hover,.panel-resize.active{background:var(--accent)}
.panel-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--surface);z-index:5}
.panel-body{overflow-y:auto;flex:1}
.panel-title{font-size:15px;font-weight:600;flex:1}
.panel-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.panel-close:hover{background:var(--surface2);color:var(--text)}
.panel-body{padding:16px 20px 32px}
.field-group{margin-bottom:18px}
.field-label{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.field-input{width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:inherit;transition:border-color .15s;resize:vertical}
.field-input:focus{outline:none;border-color:var(--accent)}
.field-textarea{min-height:72px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ── Accordion ── */
.accordion{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.acc-header{padding:10px 14px;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;user-select:none;transition:background .15s}
.acc-header:hover{background:var(--surface3)}
.acc-chevron{font-size:10px;transition:transform .2s;color:var(--text-muted)}
.accordion.open .acc-chevron{transform:rotate(180deg)}
.acc-body{display:none;padding:14px;background:var(--surface)}
.accordion.open .acc-body{display:block}

/* ── Checkbox group ── */
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px}
.cb-item{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:12px;transition:all .15s;user-select:none}
.cb-item:hover{border-color:var(--border-hover)}
.cb-item.checked{background:rgba(56,139,253,.13);border-color:rgba(56,139,253,.3);color:var(--accent)}
.cb-item input{display:none}

/* ── C單 Export ── */
.export-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;color:var(--text-muted);white-space:pre-wrap;font-family:monospace;max-height:200px;overflow-y:auto;margin-bottom:8px;line-height:1.6}

/* ── Events Page (Calendar) ── */
#page-events{overflow:hidden;flex-direction:column}
.cal-wrapper{display:flex;flex-direction:column;height:100%;overflow:hidden}
.cal-header{flex-shrink:0;padding:14px 20px 10px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--surface)}
.cal-nav{display:flex;align-items:center;gap:6px}
.cal-nav-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:hover{border-color:var(--border-hover);background:var(--surface3)}
.cal-month-label{font-size:16px;font-weight:600;min-width:110px;text-align:center}
.cal-today-btn{padding:4px 12px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:12px;cursor:pointer;transition:all .15s}
.cal-today-btn:hover{border-color:var(--border-hover);color:var(--text)}
.cal-header-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.cal-body{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0 8px 8px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px 0 4px;flex-shrink:0}
.cal-weekday{text-align:center;font-size:11px;font-weight:600;color:var(--text-muted);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:2px;flex:1;overflow:hidden}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 7px;display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:all .12s;overflow:hidden;min-height:0}
.cal-cell:hover{border-color:var(--border-hover);background:var(--surface2)}
.cal-cell.other-month{opacity:.35}
.cal-cell.today{border-color:var(--accent);background:rgba(56,139,253,.07)}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text-muted);flex-shrink:0}
.cal-cell.today .cal-day-num{color:var(--accent);font-weight:700}
.cal-chip{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--accent);color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;flex-shrink:0}
.cal-chip:hover{opacity:.85}
.cal-chip.status-green{background:var(--green)}
.cal-chip.status-yellow{background:var(--yellow);color:#000}
.cal-chip.status-red{background:var(--red)}
.cal-chip.status-gray{background:var(--gray)}
.cal-more{font-size:10px;color:var(--text-muted);padding:1px 4px}
.event-badge{padding:3px 8px;border-radius:5px;font-size:11px;font-weight:500}
.badge-upcoming{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-past{background:var(--gray-bg);color:var(--gray);border:1px solid var(--gray-border)}
.badge-today{background:rgba(56,139,253,.13);color:var(--accent);border:1px solid rgba(56,139,253,.3)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:540px;max-width:95vw;max-height:80vh;overflow-y:auto;padding:24px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:18px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* ── AI Page ── */
#page-ai{overflow:hidden;flex-direction:column}
.ai-container{display:flex;flex-direction:column;height:100%;padding:0}
.chat-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:78%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6}
.chat-msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-radius:12px 12px 2px 12px}
.chat-msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--text)}
.chat-msg.system{align-self:center;background:var(--surface2);color:var(--text-muted);font-size:12px;border-radius:8px;padding:6px 12px}
.chat-input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:10px;align-items:flex-end}
.chat-input{flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;resize:none;max-height:120px;transition:border-color .15s;line-height:1.5}
.chat-input:focus{outline:none;border-color:var(--accent)}
.ai-settings{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-muted)}

<script>
/* ═══════════════════════════════════════
   UTILITY
═══════════════════════════════════════ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

function toast(msg,dur=2200){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

/* ═══════════════════════════════════════
   DATA MODEL
═══════════════════════════════════════ */
const STATUS_LABELS={green:'高意願',yellow:'觀察中',red:'冷淡',gray:'無效',null:'根節點'};
const STATUS_ORDER=['green','yellow','red','gray'];

function newNode(){
  return{
    id:uid(),parentId:null,x:0,y:0,
    name:'新聯繫人',status:'yellow',collapsed:false,
    info:{
      age:'',zodiac:'',hometown:'',personality:'',interests:'',
      howMet:'',background:'',
      currentJob:'',jobDuration:'',prevJob:'',prevJobLevel:'',
      income:'',salaryTransfer:'',hasProperty:'',familyProperty:'',
      hasInvestment:'',hasInsurance:'',creditCard:'',debt:'',
      invitationMethod:'',knowsVenueFee:'',knowsTuition:'',
      keyQuestions:'',needs:[],canDecide:'',payOnSite:'',
      eventDate:'',eventName:'',referrer:'',recommender:'',
      formNotes:'',
      company:'',phone:'',email:'',lastContact:'',
      source:'',priority:'',tags:[],notes:''
    }
  };
}

let nodes=[];
let events=[];
let tasks=[];
let chatHistory=[];

/* ── Migration from crm-v2 (recursive tree) ── */
function migrateOldTree(treeNode,parentId=null,result=[]){
  const{children,...rest}=treeNode;
  result.push({...rest,parentId,x:undefined,y:undefined});
  (children||[]).forEach(c=>migrateOldTree(c,treeNode.id,result));
  return result;
}

function loadData(){
  try{
    const raw=localStorage.getItem('crm-v3');
    if(raw){nodes=JSON.parse(raw);}
    else{
      const old=localStorage.getItem('crm-v2');
      if(old){
        const tree=JSON.parse(old);
        nodes=migrateOldTree(tree);
        toast('已從舊格式遷移資料');
      } else {
        nodes=buildDemoData();
      }
    }
  }catch(e){nodes=buildDemoData();}
  // Always ensure at least one editable node exists
  if(!nodes||nodes.length===0){
    const starter=newNode('點擊編輯此節點');
    starter.x=200; starter.y=100; starter.parentId=null;
    nodes=[starter];
    saveData();
  }
  try{events=JSON.parse(localStorage.getItem('crm-events')||'[]');}catch(e){events=[];}
  try{tasks=JSON.parse(localStorage.getItem('crm-tasks')||'[]');}catch(e){tasks=[];}
  try{chatHistory=JSON.parse(localStorage.getItem('crm-chat')||'[]');}catch(e){chatHistory=[];}
}

function saveData(){
  localStorage.setItem('crm-v3',JSON.stringify(nodes));
}

function findNode(id){return nodes.find(n=>n.id===id)||null;}
function getChildren(id){return nodes.filter(n=>n.parentId===id);}
function getRoots(){return nodes.filter(n=>!n.parentId);}

function isHidden(id){
  const n=findNode(id);
  if(!n)return false;
  if(!n.parentId)return false;
  const p=findNode(n.parentId);
  if(!p)return false;
  if(p.collapsed)return true;
  return isHidden(p.id);
}

function gatherSubtree(id){
  const ids=[id];
  const kids=getChildren(id);
  kids.forEach(c=>gatherSubtree(c.id).forEach(x=>ids.push(x)));
  return ids;
}

/* ═══════════════════════════════════════
   DEMO DATA
═══════════════════════════════════════ */
function buildDemoData(){
  const mkInfo=(o)=>Object.assign(newNode().info,o);
  const root={id:'root',parentId:null,x:0,y:0,name:'我的人脈',status:null,collapsed:false,info:mkInfo({notes:'根節點'})};
  const zhang={id:'n1',parentId:'root',x:0,y:0,name:'張偉明',status:'green',collapsed:false,info:mkInfo({company:'ABC科技',age:'38',currentJob:'業務總監',income:'月收12萬',hasProperty:'名下一間自住',tags:['客戶','VIP'],lastContact:'2026-03-15',eventDate:'2026-03-25',eventName:'台中聯合分享會',referrer:'自己',needs:['買房','學習']})};
  const li={id:'n2',parentId:'n1',x:0,y:0,name:'李曉華',status:'yellow',collapsed:false,info:mkInfo({company:'ABC科技',currentJob:'行政助理',tags:['介紹人'],lastContact:'2026-02-20'})};
  const wang={id:'n3',parentId:'root',x:0,y:0,name:'王淑芬',status:'yellow',collapsed:false,info:mkInfo({company:'DEF顧問',tags:['潛在客戶'],lastContact:'2026-03-01'})};
  const chen={id:'n4',parentId:'root',x:0,y:0,name:'陳建國',status:'red',collapsed:false,info:mkInfo({company:'GHI集團',tags:['前客戶'],lastContact:'2025-12-01'})};
  const lin={id:'n5',parentId:'n4',x:0,y:0,name:'林志偉',status:'gray',collapsed:false,info:mkInfo({tags:['無效'],lastContact:'2025-10-15'})};
  return[root,zhang,li,wang,chen,lin];
}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
const NODE_W=160,NODE_H_EST=120,GAP_H=40,GAP_V=80;

function subtreeW(id){
  const n=findNode(id);if(!n)return NODE_W+GAP_H;
  const kids=getChildren(id).filter(c=>!n.collapsed);
  if(!kids.length)return NODE_W+GAP_H;
  return kids.reduce((s,c)=>s+subtreeW(c.id),0);
}

function layoutFrom(id,cx,y){
  const n=findNode(id);if(!n)return;
  if(n.x===undefined||n.x===null||n.x===0&&n.y===0&&id!=='root'){
    n.x=cx-NODE_W/2;n.y=y;
  } else if(id==='root'&&n.x===0&&n.y===0){
    n.x=cx-NODE_W/2;n.y=y;
  }
  const kids=getChildren(id);
  if(!kids.length)return;
  const totalW=kids.reduce((s,c)=>s+subtreeW(c.id),0);
  let lx=cx-totalW/2;
  kids.forEach(c=>{
    const cw=subtreeW(c.id);
    layoutFrom(c.id,lx+cw/2,y+NODE_H_EST+GAP_V);
    lx+=cw;
  });
}

function autoLayout(){
  const roots=getRoots();
  const totalW=roots.reduce((s,r)=>s+subtreeW(r.id),0);
  let lx=-(totalW/2);
  roots.forEach(r=>{
    const rw=subtreeW(r.id);
    layoutFrom(r.id,lx+rw/2,0);
    lx+=rw;
  });
}

/* ═══════════════════════════════════════
   CANVAS STATE
═══════════════════════════════════════ */
let panX=0,panY=0,zoom=1;
let isPanning=false,isDragging=false;
let dragId=null;
let dragStartMX,dragStartMY;
let dragStartPositions=new Map();
let panStartMX,panStartMY,panStartPX,panStartPY;
let didMove=false;
const DRAG_THRESHOLD=4;
let isResizingPanel=false,resizeStartX=0,resizeStartW=380;
let _suppressNextCanvasClick=false;
let _nodeWasMousedDown=false; // true when mousedown landed on a node wrap
let selId=null;
let currentPage='crm';
let clipboard=null;

const container=()=>document.getElementById('canvas-container');

function applyTransform(){
  document.getElementById('canvas').style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
}

function updateZoomLabel(){
  const el=document.getElementById('zoom-label');
  if(el)el.textContent=Math.round(zoom*100)+'%';
}

function zoomBy(f){
  const c=container();
  const cx=c.offsetWidth/2,cy=c.offsetHeight/2;
  const nz=Math.max(0.15,Math.min(4,zoom*f));
  panX=cx-(cx-panX)*(nz/zoom);
  panY=cy-(cy-panY)*(nz/zoom);
  zoom=nz;
  applyTransform();updateZoomLabel();
}

function fitView(){
  const vis=nodes.filter(n=>!isHidden(n.id));
  if(!vis.length)return;
  const padding=80;
  const minX=Math.min(...vis.map(n=>n.x));
  const maxX=Math.max(...vis.map(n=>n.x+NODE_W));
  const minY=Math.min(...vis.map(n=>n.y));
  const maxY=Math.max(...vis.map(n=>n.y+NODE_H_EST));
  const c=container();
  const cw=c.offsetWidth,ch=c.offsetHeight;
  const nz=Math.min(1.2,Math.min((cw-padding*2)/(maxX-minX||1),(ch-padding*2)/(maxY-minY||1)));
  zoom=Math.max(0.15,nz);
  panX=(cw-(maxX-minX)*zoom)/2-minX*zoom;
  panY=(ch-(maxY-minY)*zoom)/2-minY*zoom;
  applyTransform();updateZoomLabel();
}

/* ═══════════════════════════════════════
   RENDER NODES
═══════════════════════════════════════ */
function renderNodes(){
  const layer=document.getElementById('nodes-layer');
  layer.innerHTML='';
  nodes.forEach(n=>{
    if(isHidden(n.id))return;
    const isRoot=!n.parentId&&n.status===null;
    const kids=getChildren(n.id);
    const hasKids=kids.length>0;
    const meta=n.info.company||(n.info.tags&&n.info.tags[0])||'';

    const wrap=document.createElement('div');
    wrap.className='node-wrap'+(n.status&&!isRoot?' status-'+n.status:'')+(selId===n.id?' selected':'');
    wrap.dataset.id=n.id;
    wrap.style.cssText=`left:${n.x}px;top:${n.y}px`;

    let statusHtml='';
    if(isRoot){
      statusHtml=`<div class="node-root-pill">根節點</div>`;
    } else {
      statusHtml=`<div class="status-pill" data-a="status" data-id="${n.id}"><span class="status-dot"></span>${STATUS_LABELS[n.status]||''}</div>`;
    }

    let collapseHtml='';
    if(hasKids){
      const visKids=kids.filter(c=>!isHidden(c.id)).length;
      collapseHtml=`<button class="collapse-btn" data-a="collapse" data-id="${n.id}">${n.collapsed?'▼ 展開('+kids.length+')':'▲ 收合'}</button>`;
    }

    wrap.innerHTML=`
      <div class="node-card">
        <div class="node-drag-handle" title="拖曳移動">⠿</div>
        <div class="node-header">
          <div class="node-avatar">${(n.name||'?')[0]}</div>
          <div class="node-name" data-a="open" data-id="${n.id}" title="${n.name}">${n.name}</div>
        </div>
        ${statusHtml}
        <div class="node-footer">
          <div class="node-meta">${meta}</div>
          <div class="node-actions">
            <button class="act-btn" data-a="add" data-id="${n.id}" title="新增子節點">+</button>
            <button class="act-btn del" data-a="del" data-id="${n.id}" title="刪除">🗑</button>
          </div>
        </div>
        ${collapseHtml}
      </div>`;

    // Node drag — mousedown on wrap
    wrap.addEventListener('mousedown',e=>{
      if(e.button!==0)return;
      e.stopPropagation();
      _nodeWasMousedDown=true; // flag: background click should be suppressed
      // select
      selectNode(n.id);
      // start drag
      dragId=n.id;
      dragStartMX=e.clientX;
      dragStartMY=e.clientY;
      dragStartPositions=new Map();
      const subtree=gatherSubtree(n.id);
      subtree.forEach(sid=>{
        const sn=findNode(sid);
        if(sn)dragStartPositions.set(sid,{x:sn.x,y:sn.y});
      });
      isDragging=false;
      didMove=false;
    });

    // Click handlers — always stop propagation so canvas doesn't see it
    wrap.addEventListener('click',e=>{
      e.stopPropagation();
      if(isDragging)return; // ignore click after drag
      const a=e.target.closest('[data-a]');
      if(!a)return;
      const act=a.dataset.a,id=a.dataset.id;
      if(act==='open'){openPanel(id);}
      else if(act==='status'){cycleStatus(id);}
      else if(act==='add'){addChild(id);}
      else if(act==='del'){promptDel(id);}
      else if(act==='collapse'){toggleCollapse(id);}
    });

    layer.appendChild(wrap);
  });

  setTimeout(drawEdges,0);
  updateStats();
}

/* ═══════════════════════════════════════
   EDGE DRAWING
═══════════════════════════════════════ */
function drawEdges(){
  const svg=document.getElementById('edges-svg');
  svg.innerHTML='';
  nodes.forEach(n=>{
    if(!n.parentId)return;
    if(isHidden(n.id))return;
    const parent=findNode(n.parentId);
    if(!parent||isHidden(parent.id))return;
    if(parent.collapsed)return;
    const pEl=document.querySelector(`.node-wrap[data-id="${parent.id}"]`);
    const nEl=document.querySelector(`.node-wrap[data-id="${n.id}"]`);
    if(!pEl||!nEl)return;
    const px=parent.x+NODE_W/2;
    const py=parent.y+pEl.offsetHeight;
    const cx=n.x+NODE_W/2;
    const cy=n.y;
    const my=(py+cy)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M ${px} ${py} C ${px} ${my}, ${cx} ${my}, ${cx} ${cy}`);
    path.setAttribute('stroke','#30363d');
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('fill','none');
    svg.appendChild(path);
  });
}

/* ═══════════════════════════════════════
   SELECTION
═══════════════════════════════════════ */
function selectNode(id){
  if(selId===id)return;
  selId=id;
  document.querySelectorAll('.node-wrap').forEach(el=>{
    el.classList.toggle('selected',el.dataset.id===id);
  });
}

function deselect(){
  selId=null;
  document.querySelectorAll('.node-wrap.selected').forEach(el=>el.classList.remove('selected'));
}

/* ═══════════════════════════════════════
   NODE OPERATIONS
═══════════════════════════════════════ */
function createNodeAt(cx,cy){
  const n=newNode();
  n.parentId=null;
  n.x=cx-NODE_W/2;
  n.y=cy-30;
  nodes.push(n);
  saveData();
  renderNodes();
  selectNode(n.id);
  openPanel(n.id);
  toast('已新增節點 — 點擊姓名編輯');
}

function addChild(parentId){
  const parent=findNode(parentId);
  if(!parent)return;
  const siblings=getChildren(parentId);
  const n=newNode();
  n.parentId=parentId;
  n.x=parent.x+siblings.length*(NODE_W+GAP_H);
  n.y=parent.y+NODE_H_EST+GAP_V;
  parent.collapsed=false;
  nodes.push(n);
  saveData();
  renderNodes();
  selectNode(n.id);
  openPanel(n.id);
}

function headerAddNode(){
  if(selId){
    addChild(selId);
  } else {
    const c=container();
    const cx=(c.offsetWidth/2-panX)/zoom;
    const cy=(c.offsetHeight/2-panY)/zoom;
    createNodeAt(cx,cy);
  }
}

function cycleStatus(id){
  const n=findNode(id);if(!n)return;
  if(n.status===null)return; // root
  const idx=STATUS_ORDER.indexOf(n.status);
  n.status=STATUS_ORDER[(idx+1)%STATUS_ORDER.length];
  saveData();
  const wrap=document.querySelector(`.node-wrap[data-id="${id}"]`);
  if(wrap){
    STATUS_ORDER.forEach(s=>wrap.classList.remove('status-'+s));
    wrap.classList.add('status-'+n.status);
    const pill=wrap.querySelector('.status-pill');
    if(pill)pill.lastChild.textContent=STATUS_LABELS[n.status];
  }
}

function toggleCollapse(id){
  const n=findNode(id);if(!n)return;
  n.collapsed=!n.collapsed;
  saveData();
  renderNodes();
}

function promptDel(id){
  const n=findNode(id);if(!n)return;
  const kids=gatherSubtree(id);
  const msg=kids.length>1?`確定刪除「${n.name}」及其 ${kids.length-1} 個子節點？`:`確定刪除「${n.name}」？`;
  if(confirm(msg)){
    kids.forEach(kid=>{nodes=nodes.filter(x=>x.id!==kid);});
    if(selId===id||kids.includes(selId)){selId=null;}
    if(panelNodeId===id){closePanel();}
    saveData();
    renderNodes();
    toast('已刪除');
  }
}

/* ═══════════════════════════════════════
   CLIPBOARD
═══════════════════════════════════════ */
function copySelected(){
  if(!selId)return;
  const n=findNode(selId);if(!n)return;
  clipboard=JSON.parse(JSON.stringify(n));
  toast('已複製：'+n.name);
}
function cutSelected(){
  if(!selId)return;
  copySelected();
  promptDel(selId);
}
function pasteClipboard(){
  if(!clipboard)return;
  const n=JSON.parse(JSON.stringify(clipboard));
  n.id=uid();
  n.parentId=selId||null;
  n.x+=30;n.y+=30;
  nodes.push(n);
  saveData();renderNodes();
  selId=n.id;
  toast('已貼上：'+n.name);
}

/* ═══════════════════════════════════════
   CANVAS INTERACTIONS
═══════════════════════════════════════ */
function initCanvas(){
  const cont=container();

  // Zoom
  cont.addEventListener('wheel',e=>{
    e.preventDefault();
    const rect=cont.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const my=e.clientY-rect.top;
    const f=e.deltaY<0?1.12:0.9;
    const nz=Math.max(0.15,Math.min(4,zoom*f));
    panX=mx-(mx-panX)*(nz/zoom);
    panY=my-(my-panY)*(nz/zoom);
    zoom=nz;
    applyTransform();updateZoomLabel();
  },{passive:false});

  // Canvas background click/pan detection
  // Use separate flags so pan-drag doesn't block future clicks
  let canvasPanMoved=false;
  cont.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    // Only start pan when clicking the background (not on a node)
    // Node wraps stopPropagation on mousedown, so if we get here it's background
    isPanning=true;
    canvasPanMoved=false;
    panStartMX=e.clientX;panStartMY=e.clientY;
    panStartPX=panX;panStartPY=panY;
    cont.style.cursor='grabbing';
  });
  // Canvas click = deselect only (node creation via toolbar/shortcut only)
  cont.addEventListener('click',e=>{
    if(_suppressNextCanvasClick){_suppressNextCanvasClick=false;return;}
    if(canvasPanMoved)return;
    deselect();
    closePanel();
  });

  // Global mousemove
  document.addEventListener('mousemove',e=>{
    if(dragId!==null){
      const dx=e.clientX-dragStartMX;
      const dy=e.clientY-dragStartMY;
      if(!isDragging&&Math.hypot(dx,dy)>DRAG_THRESHOLD){isDragging=true;didMove=true;}
      if(isDragging){
        dragStartPositions.forEach((pos,id)=>{
          const dn=findNode(id);
          if(dn){
            dn.x=pos.x+dx/zoom;
            dn.y=pos.y+dy/zoom;
            const el=document.querySelector(`.node-wrap[data-id="${id}"]`);
            if(el){el.style.left=dn.x+'px';el.style.top=dn.y+'px';}
          }
        });
        drawEdges();
      }
      return;
    }
    if(isPanning){
      const dx=e.clientX-panStartMX;
      const dy=e.clientY-panStartMY;
      if(Math.hypot(dx,dy)>DRAG_THRESHOLD)canvasPanMoved=true;
      panX=panStartPX+dx;panY=panStartPY+dy;
      applyTransform();
    }
  });

  // Global mouseup
  document.addEventListener('mouseup',e=>{
    if(isResizingPanel){
      isResizingPanel=false;
      document.body.style.cursor='';
      document.getElementById('panel-resize').classList.remove('active');
      return;
    }
    if(dragId!==null){
      if(isDragging){saveData();}
      const wasDragging=isDragging;
      dragId=null;isDragging=false;
      // If was dragging a node, the upcoming click event should be suppressed
      // We flag this via a short-lived guard
      if(wasDragging) _suppressNextCanvasClick=true;
      return;
    }
    if(isPanning){
      isPanning=false;
      cont.style.cursor='default';
      // canvasPanMoved stays set until next mousedown — checked in click handler
    }
  });

  /* ── Pinch-to-zoom (trackpad / touch) ── */
  let lastPinchDist=null;
  cont.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    }
  },{passive:true});
  cont.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&lastPinchDist){
      e.preventDefault();
      const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      const f=dist/lastPinchDist;
      const midX=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
      const rect=cont.getBoundingClientRect();
      const mx=midX-rect.left, my=midY-rect.top;
      const nz=Math.max(0.15,Math.min(4,zoom*f));
      panX=mx-(mx-panX)*(nz/zoom);
      panY=my-(my-panY)*(nz/zoom);
      zoom=nz; lastPinchDist=dist;
      applyTransform(); updateZoomLabel();
    }
  },{passive:false});
  cont.addEventListener('touchend',e=>{ if(e.touches.length<2) lastPinchDist=null; },{passive:true});

  /* ── Panel resize handle ── */
  const resizeHandle=document.getElementById('panel-resize');
  resizeHandle.addEventListener('mousedown',e=>{
    isResizingPanel=true;
    resizeStartX=e.clientX;
    resizeStartW=document.getElementById('side-panel').offsetWidth;
    document.body.style.cursor='col-resize';
    resizeHandle.classList.add('active');
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(isResizingPanel){
      const dx=resizeStartX-e.clientX;
      const w=Math.max(280,Math.min(680,resizeStartW+dx));
      document.getElementById('side-panel').style.width=w+'px';
    }
  });
}

/* ═══════════════════════════════════════
   SHORTCUTS SYSTEM
═══════════════════════════════════════ */
const DEFAULT_SHORTCUTS = {
  addSibling:  { key:'Enter',   ctrl:false, label:'新增同層節點 (Enter)',  desc:'平行新增' },
  addChild:    { key:'Tab',     ctrl:false, label:'新增子節點 (Tab)',      desc:'向下新增' },
  delete:      { key:'Delete',  ctrl:false, label:'刪除節點 (Del)',        desc:'刪除' },
  fitView:     { key:'f',       ctrl:false, label:'全覽 (F)',              desc:'全覽' },
  copy:        { key:'c',       ctrl:true,  label:'複製 (⌘C)',            desc:'複製' },
  paste:       { key:'v',       ctrl:true,  label:'貼上 (⌘V)',            desc:'貼上' },
  cut:         { key:'x',       ctrl:true,  label:'剪下 (⌘X)',            desc:'剪下' },
  zoomIn:      { key:'=',       ctrl:true,  label:'放大 (⌘=)',            desc:'放大' },
  zoomOut:     { key:'-',       ctrl:true,  label:'縮小 (⌘-)',            desc:'縮小' },
  escape:      { key:'Escape',  ctrl:false, label:'取消選取 (Esc)',        desc:'Esc' },
};
let sk = JSON.parse(localStorage.getItem('crm-shortcuts')||'null') || JSON.parse(JSON.stringify(DEFAULT_SHORTCUTS));
function saveShortcuts(){ localStorage.setItem('crm-shortcuts',JSON.stringify(sk)); }
function resetShortcuts(){ sk=JSON.parse(JSON.stringify(DEFAULT_SHORTCUTS)); saveShortcuts(); renderSkModal(); renderShortcutsHint(); toast('已恢復預設快捷鍵'); }

function matchShortcut(action, e){
  const s=sk[action]; if(!s) return false;
  const ctrl=e.ctrlKey||e.metaKey;
  return e.key.toLowerCase()===s.key.toLowerCase() && ctrl===s.ctrl;
}

function renderShortcutsHint(){
  const el=document.getElementById('shortcuts-hint'); if(!el) return;
  const pairs=[
    ['addSibling'], ['addChild'], ['copy'], ['paste'], ['cut'], ['delete'], ['fitView'], ['escape']
  ];
  el.innerHTML = pairs.map(([a])=>{
    const s=sk[a]; if(!s) return '';
    const k=(s.ctrl?'⌘+':'')+s.key.replace('Delete','Del').replace('Escape','Esc').replace('ArrowUp','↑').replace('ArrowDown','↓');
    return `<span><kbd>${k}</kbd> ${s.desc}</span>`;
  }).join('');
}

/* Shortcuts modal */
let listeningAction=null;
function openSkModal(){
  document.getElementById('sk-modal').classList.add('open');
  renderSkModal();
}
function closeSkModal(){ document.getElementById('sk-modal').classList.remove('open'); listeningAction=null; }
function renderSkModal(){
  const body=document.getElementById('sk-body'); if(!body) return;
  const curTheme=document.documentElement.getAttribute('data-theme')||'dark';
  body.innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">背景主題</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        ${THEMES.map(t=>`
          <div onclick="applyTheme('${t.id}');renderSkModal()" style="padding:10px 6px;border-radius:8px;border:2px solid ${curTheme===t.id?'var(--accent)':'var(--border)'};cursor:pointer;text-align:center;background:var(--surface2);transition:all .15s">
            <div style="font-size:20px;margin-bottom:4px">${t.icon}</div>
            <div style="font-size:11px;color:var(--text-muted)">${t.label}</div>
          </div>`).join('')}
      </div>
    </div>
    <div style="font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">快捷鍵</div>
    ${Object.entries(sk).map(([action,s])=>`
    <div class="sk-row">
      <div class="sk-action">${s.label}</div>
      <div class="sk-capture${listeningAction===action?' listening':''}" data-action="${action}" onclick="startListening('${action}')">
        ${listeningAction===action ? '按下新按鍵…' : (s.ctrl?'⌘+':'')+s.key.replace('Escape','Esc').replace('Delete','Del')}
      </div>
    </div>`).join('')}`;
}
function startListening(action){
  listeningAction=action;
  renderSkModal();
}
document.addEventListener('keydown',e=>{
  if(listeningAction){
    e.preventDefault(); e.stopPropagation();
    const ctrl=e.ctrlKey||e.metaKey;
    if(e.key==='Escape'&&!ctrl){ listeningAction=null; renderSkModal(); return; }
    sk[listeningAction]={...sk[listeningAction], key:e.key, ctrl};
    saveShortcuts(); renderShortcutsHint();
    listeningAction=null; renderSkModal();
    if(currentPage==='settings') renderSettingsPage();
    return;
  }
  // Normal shortcuts
  const tag=e.target.tagName;
  const inInput=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT';
  if(inInput)return;
  if(currentPage!=='crm')return;
  const ctrl=e.ctrlKey||e.metaKey;
  if(matchShortcut('copy',e)){e.preventDefault();copySelected();}
  else if(matchShortcut('cut',e)){e.preventDefault();cutSelected();}
  else if(matchShortcut('paste',e)){e.preventDefault();pasteClipboard();}
  else if(matchShortcut('zoomIn',e)){e.preventDefault();zoomBy(1.15);}
  else if(matchShortcut('zoomOut',e)){e.preventDefault();zoomBy(0.87);}
  else if(ctrl&&e.key==='0'){e.preventDefault();fitView();}
  else if(matchShortcut('delete',e)&&selId){e.preventDefault();promptDel(selId);}
  else if(!ctrl&&e.key==='Backspace'&&selId){e.preventDefault();promptDel(selId);}
  else if(matchShortcut('escape',e)){deselect();closePanel();}
  else if(matchShortcut('fitView',e)&&!ctrl){fitView();}
  else if(matchShortcut('addSibling',e)&&selId){e.preventDefault();addSibling(selId);}
  else if(matchShortcut('addChild',e)&&selId){e.preventDefault();addChild(selId);}
});

/* Add sibling node */
function addSibling(id){
  const n=findNode(id); if(!n) return;
  const nn=newNode();
  nn.parentId=n.parentId;
  nn.x=n.x+(NODE_W+40);
  nn.y=n.y;
  nodes.push(nn);
  saveData(); renderNodes();
  openPanel(nn.id);
  toast('已新增同層節點');
}

function updateStats(){
  const total=nodes.filter(n=>n.status!==null).length;
  const green=nodes.filter(n=>n.status==='green').length;
  const yellow=nodes.filter(n=>n.status==='yellow').length;
  const red=nodes.filter(n=>n.status==='red').length;
  document.getElementById('header-stats').innerHTML=`
    <div class="stat"><span class="stat-dot" style="background:var(--green)"></span>${green} 高意願</div>
    <div class="stat"><span class="stat-dot" style="background:var(--yellow)"></span>${yellow} 觀察中</div>
    <div class="stat"><span class="stat-dot" style="background:var(--red)"></span>${red} 冷淡</div>
    <div class="stat"><span class="stat-dot" style="background:var(--border-hover)"></span>${total} 總計</div>`;
}

let panelNodeId=null;

function openPanel(id){
  const n=findNode(id);if(!n)return;
  panelNodeId=id;
  selectNode(id);
  document.getElementById('panel-title').textContent=n.name||'聯繫人資料';
  renderPanel(n);
  document.getElementById('side-panel').classList.add('open');
}

function closePanel(){
  document.getElementById('side-panel').classList.remove('open');
  panelNodeId=null;
}

function savePanel(){
  if(!panelNodeId)return;
  const n=findNode(panelNodeId);if(!n)return;
  const body=document.getElementById('panel-body');
  // name
  const nameEl=body.querySelector('[data-field="name"]');
  if(nameEl)n.name=nameEl.value;
  // info fields
  body.querySelectorAll('[data-info]').forEach(el=>{
    const k=el.dataset.info;
    if(el.type==='checkbox'){/* handled via cb-item */}
    else n.info[k]=el.value;
  });
  // tags
  const tagsEl=body.querySelector('[data-info="tags-input"]');
  if(tagsEl)n.info.tags=tagsEl.value.split(',').map(s=>s.trim()).filter(Boolean);
  // needs checkboxes
  const needsChecked=[];
  body.querySelectorAll('[data-need].checked').forEach(el=>needsChecked.push(el.dataset.need));
  n.info.needs=needsChecked;

  document.getElementById('panel-title').textContent=n.name||'聯繫人資料';
  saveData();
  // update node card
  const wrap=document.querySelector(`.node-wrap[data-id="${n.id}"]`);
  if(wrap){
    const nameDiv=wrap.querySelector('.node-name');
    if(nameDiv){nameDiv.textContent=n.name;nameDiv.title=n.name;}
    const avatar=wrap.querySelector('.node-avatar');
    if(avatar)avatar.textContent=(n.name||'?')[0];
    const meta=wrap.querySelector('.node-meta');
    if(meta)meta.textContent=n.info.company||(n.info.tags&&n.info.tags[0])||'';
  }
  updateStats();
}

function toROCDate(dateStr){
  if(!dateStr)return'';
  try{
    const d=new Date(dateStr);
    const y=d.getFullYear()-1911;
    const m=String(d.getMonth()+1).padStart(2,'0');
    const day=String(d.getDate()).padStart(2,'0');
    return`民國${y}年${m}月${day}日`;
  }catch(e){return dateStr;}
}

function buildCSheet(n){
  if(!n)return'';
  const i=n.info;
  const lines=[
    `姓名：${n.name||''}`,
    `年齡：${i.age||''} 歲　星座：${i.zodiac||''}　家鄉：${i.hometown||''}`,
    `個性：${i.personality||''}　興趣：${i.interests||''}`,
    `認識方式：${i.howMet||''}`,
    `背景：${i.background||''}`,
    ``,
    `── 工作 ──`,
    `現職：${i.currentJob||''} / 年資：${i.jobDuration||''}`,
    `前職：${i.prevJob||''} / 層級：${i.prevJobLevel||''}`,
    ``,
    `── 財務 ──`,
    `收入：${i.income||''}　薪轉：${i.salaryTransfer||''}`,
    `名下房產：${i.hasProperty||''}　家庭房產：${i.familyProperty||''}`,
    `投資：${i.hasInvestment||''}　保險：${i.hasInsurance||''}　信用卡：${i.creditCard||''}　負債：${i.debt||''}`,
    ``,
    `── 邀約 ──`,
    `邀約方式：${i.invitationMethod||''}`,
    `告知場地費：${i.knowsVenueFee||''}　告知學費79800：${i.knowsTuition||''}`,
    `需求：${(i.needs||[]).join('、')||''}`,
    `關鍵問題：${i.keyQuestions||''}`,
    `可自行決定：${i.canDecide||''}　當場付款：${i.payOnSite||''}`,
    ``,
    `── C單 ──`,

    `邀約人：${i.referrer||''}　推薦人：${i.recommender||''}`,

  return lines.join('\n');

function copyCSheet(){

  navigator.clipboard.writeText(buildCSheet(n)).then(()=>toast('C單已複製到剪貼板'));
}

/* ═══════════════════════════════════════
   EVENTS PAGE — MONTHLY CALENDAR
═══════════════════════════════════════ */
let editingEventId=null;
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth(); // 0-based

function calTodayStr(){return new Date().toISOString().slice(0,10);}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function calGoToday(){const d=new Date();calYear=d.getFullYear();calMonth=d.getMonth();renderCalendar();}

// Alias for switchPage to call
function renderEvents(){renderCalendar();}

function renderCalendar(){
  const label=document.getElementById('cal-month-label');
  if(!label)return;
  const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  label.textContent=`${calYear} 年 ${MONTHS[calMonth]}`;

  const grid=document.getElementById('cal-grid');
  if(!grid)return;

  const today=calTodayStr();
  // First day of month weekday (0=Sun)
  const firstDay=new Date(calYear,calMonth,1).getDay();
  // Days in month
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  // Days in prev month
  const daysInPrev=new Date(calYear,calMonth,0).getDate();

  const cells=[];
  // Leading days from prev month
  for(let i=firstDay-1;i>=0;i--){
    cells.push({day:daysInPrev-i,month:calMonth-1,year:calMonth===0?calYear-1:calYear,other:true});
  }
  // This month
  for(let d=1;d<=daysInMonth;d++){
    cells.push({day:d,month:calMonth,year:calYear,other:false});
  }
  // Trailing days to fill 6 rows × 7
  const needed=42-cells.length;
  for(let d=1;d<=needed;d++){
    cells.push({day:d,month:calMonth+1,year:calMonth===11?calYear+1:calYear,other:true});
  }

  grid.innerHTML=cells.map(c=>{
    const dateStr=`${c.year}-${String(c.month+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
    const isToday=dateStr===today;
    const dayEvents=events.filter(ev=>ev.date===dateStr);
    const chips=dayEvents.slice(0,3).map(ev=>`<div class="cal-chip" onclick="event.stopPropagation();openEventModal('${ev.id}')">${escHtml(ev.name||'活動')}</div>`).join('');
    const more=dayEvents.length>3?`<div class="cal-more">+${dayEvents.length-3} 更多</div>`:'';
    return`<div class="cal-cell${c.other?' other-month':''}${isToday?' today':''}" onclick="openEventModal(null,'${dateStr}')">
      <div class="cal-day-num">${c.day}</div>
      ${chips}${more}
    </div>`;
  }).join('');
}

function openEventModal(id,defaultDate){
  editingEventId=id||null;
  const ev=id?events.find(e=>e.id===id):null;
  document.getElementById('event-modal-title').textContent=ev?'編輯活動':'新增活動';
  const dateVal=ev?.date||defaultDate||'';
  document.getElementById('event-modal-body').innerHTML=`
    <div class="field-group"><div class="field-label">活動名稱</div><input class="field-input" id="ev-name" value="${escHtml(ev?.name||'')}" placeholder="活動名稱"></div>
    <div class="field-row">
      <div class="field-group"><div class="field-label">日期</div><input class="field-input" type="date" id="ev-date" value="${dateVal}"></div>
      <div class="field-group"><div class="field-label">時間</div><input class="field-input" type="time" id="ev-time" value="${ev?.time||''}"></div>
    </div>
    <div class="field-group"><div class="field-label">地點</div><input class="field-input" id="ev-location" value="${escHtml(ev?.location||'')}" placeholder="地點"></div>
    <div class="field-group"><div class="field-label">預計人數</div><input class="field-input" type="number" id="ev-attendees" value="${ev?.attendees||''}" placeholder="人數"></div>
    <div class="field-group"><div class="field-label">備注</div><textarea class="field-input field-textarea" id="ev-notes" placeholder="備注">${escHtml(ev?.notes||'')}</textarea></div>
    ${ev?`<div style="margin-top:8px"><button class="btn btn-danger btn-sm" onclick="deleteEvent('${ev.id}');closeEventModal()">🗑 刪除此活動</button></div>`:''}
  `;
  document.getElementById('event-modal').classList.add('open');
}

function closeEventModal(){
  document.getElementById('event-modal').classList.remove('open');
  editingEventId=null;
}

function saveEvent(){
  const name=document.getElementById('ev-name').value.trim();
  if(!name){toast('請輸入活動名稱');return;}
  const ev={
    id:editingEventId||uid(),
    name,
    date:document.getElementById('ev-date').value,
    time:document.getElementById('ev-time').value,
    location:document.getElementById('ev-location').value,
    attendees:parseInt(document.getElementById('ev-attendees').value)||0,
    notes:document.getElementById('ev-notes').value,
  };
  if(editingEventId){
    const idx=events.findIndex(e=>e.id===editingEventId);
    if(idx>=0)events[idx]=ev;
  } else {
    events.push(ev);
  }
  localStorage.setItem('crm-events',JSON.stringify(events));
  closeEventModal();
  renderCalendar();
  toast(editingEventId?'活動已更新':'活動已新增');
}

function deleteEvent(id){
  if(!confirm('確定刪除此活動？'))return;
  events=events.filter(e=>e.id!==id);
  localStorage.setItem('crm-events',JSON.stringify(events));
  renderCalendar();
  toast('活動已刪除');
}

function onAiProviderChange(){

function clearChat(){
  chatHistory=[];
  localStorage.setItem('crm-chat',JSON.stringify(chatHistory));

function renderChat(){
  const area=document.getElementById('chat-area');
  if(!area)return;
  if(!chatHistory.length){
    area.innerHTML='<div class="chat-msg system">您好！我是 AI 助理，可以協助分析人脈資料、建議跟進策略。</div>';
    return;
  }
  area.innerHTML=chatHistory.map(m=>`<div class="chat-msg ${m.role==='user'?'user':'ai'}">${escHtml(m.content).replace(/\n/g,'<br>')}</div>`).join('');
  area.scrollTop=area.scrollHeight;
}

function chatKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}
}

function autoResizeChat(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg)return;
  const s=getAiSettings();
  input.value='';input.style.height='auto';
  chatHistory.push({role:'user',content:msg});
  renderChat();

  if(!s.apiKey){
    chatHistory.push({role:'assistant',content:'請先在「設定 > AI 模型設定」填入 API Key。'});
    renderChat();
    localStorage.setItem('crm-chat',JSON.stringify(chatHistory));
    return;
  }

  const crmContext=nodes.slice(0,20).map(n=>`${n.name}(${n.status||'根'}):${n.info.company||''}${n.info.currentJob||''}`).join('; ');
  const systemMsg=`你是 CRM 人脈管理 AI 助理。目前人脈資料摘要：${crmContext}。請用繁體中文回答，簡潔專業。`;

  try{
    let replyText='';
    if(s.provider==='claude'){
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':s.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:s.model||'claude-3-5-haiku-20241022',max_tokens:1024,system:systemMsg,messages:chatHistory.map(m=>({role:m.role,content:m.content}))})
      });
      const d=await res.json();
      replyText=d.content?.[0]?.text||d.error?.message||'無回應';
    } else if(s.provider==='gemini'){
      const model=s.model||'gemini-1.5-flash';
      const msgs=chatHistory.map(m=>({role:m.role==='user'?'user':'model',parts:[{text:m.content}]}));
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${s.apiKey}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({systemInstruction:{parts:[{text:systemMsg}]},contents:msgs})
      });
      const d=await res.json();
      replyText=d.candidates?.[0]?.content?.parts?.[0]?.text||d.error?.message||'無回應';
    } else {
      // OpenAI-compatible: openai, grok, custom
      const endpoint=s.provider==='custom'&&s.endpoint?s.endpoint
        :s.provider==='grok'?'https://api.x.ai/v1/chat/completions'
        :'https://api.openai.com/v1/chat/completions';
      const msgs=[{role:'system',content:systemMsg},...chatHistory.map(m=>({role:m.role,content:m.content}))];
      const res=await fetch(endpoint,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${s.apiKey}`},
        body:JSON.stringify({model:s.model,max_tokens:1024,messages:msgs})
      });
      const d=await res.json();
      replyText=d.choices?.[0]?.message?.content||d.error?.message||'無回應';
    }
    chatHistory.push({role:'assistant',content:replyText});
  }catch(e){
    chatHistory.push({role:'assistant',content:'網路錯誤，請檢查連線與 API Key。'});
  }
  renderChat();
  localStorage.setItem('crm-chat',JSON.stringify(chatHistory));
}

/* ═══════════════════════════════════════
   PAGE SWITCHING
═══════════════════════════════════════ */
// display type each page needs when visible
const PAGE_DISPLAY={crm:'block',events:'flex',ai:'flex',settings:'block'};

function switchPage(page){
  currentPage=page;
  // Hide all pages via inline style (bypass CSS specificity issues)
  document.querySelectorAll('.page').forEach(p=>{p.style.display='none';});
  // Show target page with correct display type
  const el=document.getElementById('page-'+page);
  if(el) el.style.display=PAGE_DISPLAY[page]||'block';
  // Update tab highlights
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const idx={crm:0,events:1,ai:2,settings:3}[page]??0;
  document.querySelectorAll('.tab-btn')[idx]?.classList.add('active');
  if(page==='crm'){setTimeout(()=>{drawEdges();},50);}
  if(page==='events'){renderCalendar();}
  if(page==='ai'){renderChat();updateAiModelBadge();}
  if(page==='settings'){renderSettingsPage();}
}

/* ── Settings page ── */
function renderSettingsPage(){
  renderAiSettingsCard();
  // Theme grid
  const curTheme=document.documentElement.getAttribute('data-theme')||'dark';
  const tg=document.getElementById('settings-theme-grid');
  if(tg) tg.innerHTML=THEMES.map(t=>`
    <div class="theme-tile${curTheme===t.id?' active':''}" onclick="applyTheme('${t.id}');renderSettingsPage()">
      <div class="theme-tile-icon">${t.icon}</div>
      <div class="theme-tile-label">${t.label}</div>
    </div>`).join('');
  // Shortcuts
  const sb=document.getElementById('settings-sk-body');
  if(sb) sb.innerHTML=`<div style="display:flex;flex-direction:column;gap:4px">
    ${Object.entries(sk).map(([action,s])=>`
    <div class="sk-row">
      <div class="sk-action">${s.label}</div>
      <div class="sk-capture${listeningAction===action?' listening':''}" data-action="${action}" onclick="startListening('${action}');renderSettingsPage()">
        ${listeningAction===action?'按下新按鍵…':(s.ctrl?'⌘+':'')+s.key.replace('Escape','Esc').replace('Delete','Del')}
      </div>
    </div>`).join('')}
  </div>`;
}

/* ── Backup ── */
function exportAll(){
  const data={nodes,events,tasks,version:'crm-v3',exportedAt:new Date().toISOString()};
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download=`crm-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(u);
  toast('備份匯出完成');
}
function importAll(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.nodes){nodes=d.nodes;saveData();}
      if(d.events){events=d.events;localStorage.setItem('crm-events',JSON.stringify(events));}
      if(d.tasks){tasks=d.tasks;localStorage.setItem('crm-tasks',JSON.stringify(tasks));}
      renderNodes();toast('備份匯入成功');
    }catch{toast('匯入失敗：格式錯誤');}
  };
  r.readAsText(f);ev.target.value='';
}
function clearAllData(){
  if(!confirm('確定清除所有資料？此操作無法復原。'))return;
  localStorage.removeItem('crm-v3');localStorage.removeItem('crm-events');
  localStorage.removeItem('crm-tasks');localStorage.removeItem('crm-chat');
  nodes=[];events=[];tasks=[];chatHistory=[];
  loadData();renderNodes();renderSettingsPage();
  toast('已清除所有資料');
}

  if(!cid){toast('請先填入 Google Client ID');return;}

/* ═══════════════════════════════════════
   THEME
═══════════════════════════════════════ */
const THEMES = [
  { id:'dark',       label:'深色',      icon:'🌑' },
  { id:'dark-blue',  label:'深藍',      icon:'🌌' },
  { id:'light',      label:'淺色',      icon:'☀️' },
  { id:'light-warm', label:'暖色',      icon:'🌤' },
];
function applyTheme(id){
  document.documentElement.setAttribute('data-theme', id);
  localStorage.setItem('crm-theme', id);
  // update node card borders for light themes
  const isLight = id==='light'||id==='light-warm';
  document.documentElement.style.setProperty('--node-shadow', isLight ? '0 2px 8px rgba(0,0,0,.12)' : '0 2px 8px rgba(0,0,0,.4)');
}
function loadTheme(){
  const t=localStorage.getItem('crm-theme')||'dark';
  applyTheme(t);
}


function init(){
  loadTheme();
  loadData();
  // Initialize page display via JS (not CSS class) to avoid specificity conflicts
  document.querySelectorAll('.page').forEach(p=>{p.style.display='none';});
  const initPage=document.getElementById('page-crm');
  if(initPage)initPage.style.display='block';

  const needsLayout=nodes.some(n=>n.x===undefined||n.x===null);
  if(needsLayout){
    autoLayout();
    saveData();
  }

  initCanvas();
  renderNodes();
  renderShortcutsHint();

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{ fitView(); });
  });

  updateStats();
  updateAiModelBadge();
}

document.addEventListener('DOMContentLoaded',init);
</script>
