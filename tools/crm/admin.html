<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房多多 — 管理員後台</title>
  <link rel="icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #21262d;
    }
    header img { width: 36px; height: 36px; border-radius: 8px; }
    header h1 { font-size: 1.1rem; font-weight: 700; color: #e6edf3; }
    header p  { font-size: .8rem; color: #8b949e; }

    .controls {
      display: flex;
      gap: .75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls input {
      padding: .5rem .75rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: .9rem;
      width: 220px;
    }
    .controls input:focus { outline: none; border-color: #388bfd; }
    .btn {
      padding: .5rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-danger  { background: transparent; color: #f85149; border: 1px solid #f85149; }
    .btn-danger:hover  { background: #f851491a; }

    .stat-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .stat {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: .75rem 1.25rem;
      flex: 1;
      min-width: 120px;
    }
    .stat-val { font-size: 1.6rem; font-weight: 700; color: #388bfd; }
    .stat-lbl { font-size: .75rem; color: #8b949e; margin-top: 2px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #161b22;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #21262d;
    }
    thead { background: #21262d; }
    th {
      padding: .7rem 1rem;
      text-align: left;
      font-size: .78rem;
      font-weight: 600;
      color: #8b949e;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    td {
      padding: .7rem 1rem;
      font-size: .88rem;
      border-top: 1px solid #21262d;
    }
    tr:hover td { background: #1c2128; }

    .rank-badge {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
    }
    .rank-director     { background: #1f6feb33; color: #58a6ff; }
    .rank-asst_mgr     { background: #238636 33; color: #3fb950; }
    .rank-manager      { background: #d2992233; color: #e3b341; }
    .rank-shop_partner { background: #8957e533; color: #bc8cff; }
    .rank-shop_head    { background: #f8514933; color: #ff7b72; }

    .ts { color: #8b949e; font-size: .8rem; }

    .empty {
      text-align: center;
      padding: 3rem;
      color: #8b949e;
      font-size: .9rem;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #8b949e;
    }

    .error-msg {
      background: #f851491a;
      border: 1px solid #f8514940;
      border-radius: 8px;
      padding: .75rem 1rem;
      color: #ff7b72;
      margin-bottom: 1rem;
      font-size: .9rem;
    }

    /* Refresh indicator */
    .refresh-info { font-size: .78rem; color: #8b949e; margin-left: auto; }
  </style>
</head>
<body>
<header>
  <img src="icon.svg" alt="房多多">
  <div>
    <h1>房多多 管理員後台</h1>
    <p>查看同事登入狀態</p>
  </div>
</header>

<div class="controls">
  <input type="password" id="tokenInput" placeholder="Admin Token" autocomplete="off">
  <button class="btn btn-primary" onclick="loadData()">載入 / 刷新</button>
  <span class="refresh-info" id="lastRefresh"></span>
</div>

<div id="errorBox"></div>

<div class="stat-bar" id="statBar" style="display:none">
  <div class="stat"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">登入人數</div></div>
  <div class="stat"><div class="stat-val" id="statToday">0</div><div class="stat-lbl">今日登入</div></div>
  <div class="stat"><div class="stat-val" id="statSenior">0</div><div class="stat-lbl">店長及以上</div></div>
</div>

<div id="tableWrap">
  <div class="empty">請輸入 Token 後點擊「載入」</div>
</div>

<script>
  const RANK_LABEL = {
    director: '主任',
    asst_mgr: '襄理',
    manager: '經理',
    shop_partner: '店股東',
    shop_head: '店長',
  };
  const SENIOR_RANKS = new Set(['shop_partner', 'shop_head']);

  // 嘗試從 localStorage 還原 token
  const savedToken = localStorage.getItem('fdd-admin-token');
  if (savedToken) document.getElementById('tokenInput').value = savedToken;

  async function loadData() {
    const token = document.getElementById('tokenInput').value.trim();
    if (!token) { showError('請輸入 Admin Token'); return; }

    localStorage.setItem('fdd-admin-token', token);
    showError('');
    document.getElementById('tableWrap').innerHTML = '<div class="loading">載入中…</div>';

    try {
      const res = await fetch(`./api/login?token=${encodeURIComponent(token)}`);
      const data = await res.json();

      if (!data.ok) {
        showError(data.error || '請求失敗');
        document.getElementById('tableWrap').innerHTML = '';
        return;
      }

      renderTable(data.records);
      document.getElementById('lastRefresh').textContent =
        '最後更新：' + new Date().toLocaleTimeString('zh-TW');
    } catch (e) {
      showError('網路錯誤：' + e.message);
      document.getElementById('tableWrap').innerHTML = '';
    }
  }

  function renderTable(records) {
    const statBar = document.getElementById('statBar');
    statBar.style.display = 'flex';

    const today = new Date().toISOString().slice(0, 10);
    const todayCount  = records.filter(r => r.ts.startsWith(today)).length;
    const seniorCount = records.filter(r => SENIOR_RANKS.has(r.rank)).length;

    document.getElementById('statTotal').textContent  = records.length;
    document.getElementById('statToday').textContent  = todayCount;
    document.getElementById('statSenior').textContent = seniorCount;

    if (!records.length) {
      document.getElementById('tableWrap').innerHTML = '<div class="empty">目前無登入記錄</div>';
      return;
    }

    const rows = records.map(r => {
      const ts = new Date(r.ts);
      const tsStr = ts.toLocaleString('zh-TW', {
        month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit',
      });
      const rankClass = `rank-${r.rank}`;
      const rankLabel = RANK_LABEL[r.rank] || r.rank;
      return `
        <tr>
          <td>${escHtml(r.name)}</td>
          <td><span class="rank-badge ${rankClass}">${rankLabel}</span></td>
          <td class="ts">${tsStr}</td>
        </tr>`;
    }).join('');

    document.getElementById('tableWrap').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>姓名</th>
            <th>職級</th>
            <th>最後登入</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.innerHTML = msg ? `<div class="error-msg">${escHtml(msg)}</div>` : '';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 自動刷新（如果已有 token）
  if (savedToken) loadData();
</script>
</body>
</html>
