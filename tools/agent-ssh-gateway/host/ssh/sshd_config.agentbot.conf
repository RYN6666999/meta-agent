# sshd_config.agentbot.conf
# AI Agent 專用 SSH 設定片段
#
# 套用方式：
#   sudo cp host/ssh/sshd_config.agentbot.conf /etc/ssh/sshd_config.d/agentbot.conf
#   # 或手動在 /etc/ssh/sshd_config 底部加入：
#   # Include /etc/ssh/sshd_config.d/agentbot.conf
#   sudo sshd -t        # 語法驗證
#   sudo systemctl reload sshd

Match User agentbot

    # 只允許金鑰登入
    PasswordAuthentication no
    PubkeyAuthentication yes

    # 強制執行 gateway wrapper（防止繞過）
    ForceCommand /usr/local/bin/agent-gateway.sh

    # 禁止 PTY（防止互動式 shell）
    PermitTTY no

    # 禁止所有 forwarding
    AllowTcpForwarding no
    AllowStreamLocalForwarding no
    GatewayPorts no
    X11Forwarding no

    # 禁止 agent forwarding
    AllowAgentForwarding no

    # 禁止 tunnel
    PermitTunnel no
