<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>

    <!-- ── Background ── -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0b0f18"/>
      <stop offset="55%"  stop-color="#131a28"/>
      <stop offset="100%" stop-color="#0a1120"/>
    </linearGradient>

    <!-- ── Steel: front face (vertical brush) ── -->
    <linearGradient id="steelFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a8b4c0"/>
      <stop offset="8%"   stop-color="#7d8d9b"/>
      <stop offset="22%"  stop-color="#4e5d6a"/>
      <stop offset="45%"  stop-color="#353d45"/>
      <stop offset="70%"  stop-color="#272d33"/>
      <stop offset="100%" stop-color="#1c2027"/>
    </linearGradient>

    <!-- ── Steel: lid face (slightly lighter) ── -->
    <linearGradient id="steelLid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#b8c4ce"/>
      <stop offset="10%"  stop-color="#8e9eac"/>
      <stop offset="35%"  stop-color="#5c6c7a"/>
      <stop offset="70%"  stop-color="#3a444d"/>
      <stop offset="100%" stop-color="#282e35"/>
    </linearGradient>

    <!-- ── Steel: top face ── -->
    <linearGradient id="steelTop" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5a6573"/>
      <stop offset="30%"  stop-color="#8e9eac"/>
      <stop offset="65%"  stop-color="#c4ced6"/>
      <stop offset="100%" stop-color="#e8eef3"/>
    </linearGradient>

    <!-- ── Steel: right face ── -->
    <linearGradient id="steelRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3a4450"/>
      <stop offset="50%"  stop-color="#252c33"/>
      <stop offset="100%" stop-color="#181c22"/>
    </linearGradient>

    <!-- ── Gold metallic (AI letters) ── -->
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff0a0"/>
      <stop offset="18%"  stop-color="#f5c518"/>
      <stop offset="42%"  stop-color="#ffde6b"/>
      <stop offset="58%"  stop-color="#c8920a"/>
      <stop offset="80%"  stop-color="#a06800"/>
      <stop offset="100%" stop-color="#e8b400"/>
    </linearGradient>

    <!-- ── Gold highlight overlay ── -->
    <linearGradient id="goldHL" x1="0%" y1="0%" x2="0%" y2="45%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- ── Handle tube ── -->
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d6dde3"/>
      <stop offset="30%"  stop-color="#a0afbc"/>
      <stop offset="65%"  stop-color="#6b7b8a"/>
      <stop offset="100%" stop-color="#9db0be"/>
    </linearGradient>

    <!-- ── Rivet ── -->
    <radialGradient id="rivetGrad" cx="38%" cy="32%" r="60%">
      <stop offset="0%"   stop-color="#d1d9df"/>
      <stop offset="45%"  stop-color="#8898a5"/>
      <stop offset="100%" stop-color="#3a4550"/>
    </radialGradient>

    <!-- ── Clasp body ── -->
    <linearGradient id="claspGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#707e8a"/>
      <stop offset="50%"  stop-color="#3f4c57"/>
      <stop offset="100%" stop-color="#272e36"/>
    </linearGradient>

    <!-- ── Clasp lock dot (gold) ── -->
    <radialGradient id="lockGold" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#ffe680"/>
      <stop offset="55%"  stop-color="#d4960a"/>
      <stop offset="100%" stop-color="#8a5c00"/>
    </radialGradient>

    <!-- ── Global sheen (top-left diagonal) ── -->
    <linearGradient id="sheen" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.13)"/>
      <stop offset="40%"  stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.18)"/>
    </linearGradient>

    <!-- ── Vignette ── -->
    <radialGradient id="vignette" cx="50%" cy="48%" r="68%">
      <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.62)"/>
    </radialGradient>

    <!-- ── Drop shadow for the whole box ── -->
    <filter id="boxShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="rgba(0,0,0,0.78)"/>
    </filter>

    <!-- ── Soft glow behind AI text ── -->
    <filter id="textGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Clip to macOS rounded square ── -->
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>

    <!-- ── Dot-grid pattern ── -->
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1.4" fill="rgba(80,110,160,0.18)"/>
    </pattern>

  </defs>

  <!-- ════════════════════════════════════ -->
  <!-- ICON BODY                            -->
  <!-- ════════════════════════════════════ -->
  <g clip-path="url(#iconClip)">

    <!-- Background + dot grid -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>
    <rect width="1024" height="1024" fill="url(#dots)"/>

    <!-- ──────────────────────────────── -->
    <!-- 2.5D TOOLBOX                     -->
    <!--                                  -->
    <!--  Top face   (parallelogram)      -->
    <!--  Lid face   (upper ~45% front)   -->
    <!--  Body face  (lower ~55% front)   -->
    <!--  Right face (parallelogram)      -->
    <!--                                  -->
    <!--  Front rect: x=165 y=390         -->
    <!--              w=570 h=360         -->
    <!--  Perspective offset: +110, -65   -->
    <!-- ──────────────────────────────── -->
    <g filter="url(#boxShadow)">

      <!-- RIGHT FACE -->
      <polygon points="735,390 845,325 845,688 735,753"
               fill="url(#steelRight)" stroke="#10141a" stroke-width="1.5"/>
      <!-- Right face edge sheen -->
      <polygon points="735,390 740,390 740,753 735,753"
               fill="rgba(255,255,255,0.10)"/>
      <!-- Right face top-edge inner bright line -->
      <line x1="735" y1="390" x2="845" y2="325"
            stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

      <!-- BODY FACE (lower, darker) -->
      <rect x="165" y="555" width="570" height="198"
            fill="url(#steelFront)" stroke="#10141a" stroke-width="1.5"/>

      <!-- LID FACE (upper portion) -->
      <rect x="165" y="390" width="570" height="165"
            fill="url(#steelLid)" stroke="#10141a" stroke-width="1.5"/>

      <!-- TOP FACE -->
      <polygon points="165,390 735,390 845,325 275,325"
               fill="url(#steelTop)" stroke="#10141a" stroke-width="1.5"/>

      <!-- TOP FACE highlight strip -->
      <polygon points="165,390 735,390 845,325 275,325"
               fill="rgba(255,255,255,0.10)"
               clip-path="inset(0 0 55% 0)"/>

      <!-- ── Lid / Body separator groove ── -->
      <rect x="165" y="552" width="570" height="7"  fill="rgba(0,0,0,0.75)"/>
      <rect x="165" y="559" width="570" height="2"  fill="rgba(255,255,255,0.13)"/>

      <!-- ── Front top-edge bright line ── -->
      <rect x="165" y="390" width="570" height="3"  fill="rgba(255,255,255,0.60)"/>
      <!-- ── Front bottom-edge shadow ── -->
      <rect x="165" y="750" width="570" height="3"  fill="rgba(0,0,0,0.50)"/>
      <!-- ── Front left-edge highlight ── -->
      <rect x="165" y="390" width="3"   height="363" fill="rgba(255,255,255,0.42)"/>
      <!-- ── Front right-edge shadow ── -->
      <rect x="732" y="390" width="3"   height="363" fill="rgba(0,0,0,0.35)"/>

      <!-- ── Rivets (four corners on lid) ── -->
      <circle cx="198" cy="420" r="9" fill="url(#rivetGrad)" stroke="#1a2028" stroke-width="1.5"/>
      <circle cx="702" cy="420" r="9" fill="url(#rivetGrad)" stroke="#1a2028" stroke-width="1.5"/>
      <circle cx="198" cy="540" r="9" fill="url(#rivetGrad)" stroke="#1a2028" stroke-width="1.5"/>
      <circle cx="702" cy="540" r="9" fill="url(#rivetGrad)" stroke="#1a2028" stroke-width="1.5"/>

      <!-- ══════════════════════════════ -->
      <!-- HANDLE                        -->
      <!-- ══════════════════════════════ -->
      <!-- Left post -->
      <rect x="378" y="272" width="22" height="58" rx="8"
            fill="url(#handleGrad)" stroke="#10141a" stroke-width="1.5"/>
      <rect x="378" y="272" width="22" height="12" rx="5"
            fill="rgba(255,255,255,0.30)"/>
      <!-- Right post -->
      <rect x="524" y="272" width="22" height="58" rx="8"
            fill="url(#handleGrad)" stroke="#10141a" stroke-width="1.5"/>
      <rect x="524" y="272" width="22" height="12" rx="5"
            fill="rgba(255,255,255,0.30)"/>
      <!-- Handle arc (tube) -->
      <path d="M 389 285 Q 462 210 535 285"
            fill="none" stroke="url(#handleGrad)"
            stroke-width="22" stroke-linecap="round"/>
      <!-- Handle arc highlight line -->
      <path d="M 392 284 Q 462 212 532 284"
            fill="none" stroke="rgba(255,255,255,0.40)"
            stroke-width="7" stroke-linecap="round"/>
      <!-- Handle arc shadow line -->
      <path d="M 392 290 Q 462 218 532 290"
            fill="none" stroke="rgba(0,0,0,0.35)"
            stroke-width="5" stroke-linecap="round"/>

      <!-- ══════════════════════════════ -->
      <!-- CLASP / LOCK                  -->
      <!-- ══════════════════════════════ -->
      <!-- Clasp plate -->
      <rect x="428" y="530" width="68" height="46" rx="7"
            fill="url(#claspGrad)" stroke="#1a2028" stroke-width="1.5"/>
      <!-- Clasp top shine -->
      <rect x="428" y="530" width="68" height="12" rx="7"
            fill="rgba(255,255,255,0.20)"/>
      <!-- Clasp keyhole ring -->
      <circle cx="462" cy="553" r="13" fill="#2c3540" stroke="#596470" stroke-width="2"/>
      <!-- Clasp lock dot -->
      <circle cx="462" cy="553" r="6"  fill="url(#lockGold)"/>

      <!-- ══════════════════════════════ -->
      <!-- "AI" LETTERING                -->
      <!-- (gold metallic, italic bold)  -->
      <!-- ══════════════════════════════ -->

      <!-- Glow halo (warm amber behind text) -->
      <ellipse cx="450" cy="658" rx="190" ry="80"
               fill="rgba(200,140,0,0.18)" filter="url(#textGlow)"/>

      <!-- Drop shadow layer -->
      <text x="455" y="688"
            font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
            font-weight="900"
            font-style="italic"
            font-size="230"
            text-anchor="middle"
            fill="rgba(0,0,0,0.65)"
            transform="translate(6,9)">AI</text>

      <!-- Main gold text -->
      <text x="455" y="688"
            font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
            font-weight="900"
            font-style="italic"
            font-size="230"
            text-anchor="middle"
            fill="url(#goldMetal)"
            filter="url(#textGlow)">AI</text>

      <!-- Highlight overlay on text -->
      <text x="455" y="688"
            font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
            font-weight="900"
            font-style="italic"
            font-size="230"
            text-anchor="middle"
            fill="url(#goldHL)"
            opacity="0.6">AI</text>

    </g><!-- end boxShadow group -->

    <!-- ── Global sheen diagonal ── -->
    <rect width="1024" height="1024" fill="url(#sheen)"/>
    <!-- ── Vignette ── -->
    <rect width="1024" height="1024" fill="url(#vignette)"/>

  </g>
</svg>
