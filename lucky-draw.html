<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>春酒抽獎機</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0d0a1e;
      --panel:     #130e2e;
      --border:    #2a1f55;
      --gold:      #d4a94a;
      --gold-light:#f5d078;
      --gold-dim:  #8a6820;
      --red:       #c0392b;
      --red-glow:  #e74c3c;
      --text:      #f0e6d3;
      --text-dim:  #9080a0;
      --radius:    16px;
    }
    html, body {
      width: 100%; height: 100%;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg); color: var(--text);
      overflow-x: hidden;
    }
    #bg-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    /* === LAYOUT === */
    .app {
      position: relative; z-index: 1; min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr;
      grid-template-areas: "header header" "main records";
      gap: 16px; padding: 16px;
      max-width: 1400px; margin: 0 auto;
    }
    @media (max-width: 1024px) {
      .app { grid-template-columns: 1fr; grid-template-areas: "header" "main" "records"; }
    }
    @media (max-width: 640px) {
      .app { grid-template-columns: 1fr; grid-template-areas: "header" "main" "records"; }
    }

    /* === PANEL BASE === */
    .panel {
      background: linear-gradient(145deg, #1a1240 0%, #0f0b28 100%);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.6), inset 0 1px 0 rgba(212,169,74,.15);
    }
    .panel-heading {
      font-size: 1rem; font-weight: 700; color: var(--gold);
      letter-spacing: .1em; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-heading::before {
      content: ''; display: inline-block; width: 4px; height: 18px;
      background: var(--gold); border-radius: 2px; flex-shrink: 0;
    }

    /* === HEADER === */
    header {
      grid-area: header;
      display: flex; align-items: center; justify-content: center; gap: 16px;
      padding: 18px 24px; position: relative;
    }
    .header-ornament {
      flex: 1; height: 2px;
      background: linear-gradient(to right, transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
    }
    .header-title { text-align: center; }
    .header-title h1 {
      font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 900;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--red-glow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: .12em; filter: drop-shadow(0 0 12px rgba(212,169,74,.5));
    }
    .header-title p { font-size: .8rem; color: var(--text-dim); letter-spacing: .2em; margin-top: 4px; }
    .btn-settings, .btn-fullscreen {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(212,169,74,.08); border: 1px solid var(--gold-dim); border-radius: 10px;
      color: var(--gold); font-size: 1.2rem; width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .2s, transform .2s, box-shadow .2s; z-index: 10;
    }
    .btn-settings { right: 24px; }
    .btn-fullscreen { right: 76px; font-size: 1.5rem; }
    .btn-settings:hover {
      background: rgba(212,169,74,.18); box-shadow: 0 0 16px rgba(212,169,74,.3);
      transform: translateY(-50%) rotate(30deg);
    }
    .btn-fullscreen:hover {
      background: rgba(212,169,74,.18); box-shadow: 0 0 16px rgba(212,169,74,.3);
      transform: translateY(-50%) scale(1.1);
    }

    /* === IMPORT PANEL === */
    .import-panel { grid-area: import; display: flex; flex-direction: row; gap: 16px; }

    .group-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .group-tab {
      padding: 10px 6px; border-radius: 10px; border: 1px solid var(--border);
      background: rgba(255,255,255,.03); color: var(--text-dim);
      font-family: inherit; font-size: .82rem; font-weight: 700;
      cursor: pointer; transition: all .2s; text-align: center; line-height: 1.5; letter-spacing: .04em;
    }
    .group-tab small { font-weight: 400; font-size: .7rem; opacity: .75; display: block; }
    .group-tab.active-A { background: rgba(212,169,74,.12); border-color: var(--gold-dim); color: var(--gold); }
    .group-tab.active-B { background: rgba(192,57,43,.12); border-color: rgba(192,57,43,.5); color: var(--red-glow); }
    .group-tab:hover:not(.active-A):not(.active-B) { background: rgba(255,255,255,.06); color: var(--text); }

    .import-textarea {
      width: 100%; height: 130px;
      background: rgba(255,255,255,.03); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; color: var(--text);
      font-family: inherit; font-size: .78rem; resize: vertical; outline: none;
      transition: border-color .2s; line-height: 1.5;
    }
    .import-textarea:focus { border-color: var(--gold-dim); }
    .import-textarea::placeholder { color: var(--text-dim); font-size: .73rem; }

    .import-hint {
      font-size: .7rem; color: var(--text-dim); line-height: 1.6;
      padding: 8px 10px; background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.05); border-radius: 8px;
    }
    .import-hint code { color: var(--gold-dim); }

    .btn-import {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #8a6820, var(--gold), #8a6820);
      background-size: 200% 100%; border: none; border-radius: 10px;
      color: #1a0a00; font-family: inherit; font-size: .9rem; font-weight: 700;
      letter-spacing: .08em; cursor: pointer;
      transition: background-position .4s, transform .15s, box-shadow .2s;
      box-shadow: 0 2px 12px rgba(212,169,74,.3);
    }
    .btn-import:hover { background-position: right center; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(212,169,74,.5); }
    .btn-import.grp-B {
      background: linear-gradient(135deg, #7a1f14, var(--red-glow), #7a1f14);
      background-size: 200% 100%; color: #fff; box-shadow: 0 2px 12px rgba(192,57,43,.3);
    }
    .btn-import.grp-B:hover { box-shadow: 0 4px 20px rgba(192,57,43,.5); }

    .count-display { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .count-card {
      background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px; padding: 10px 12px; text-align: center;
    }
    .count-card.ca { border-color: rgba(212,169,74,.2); }
    .count-card.cb { border-color: rgba(192,57,43,.2); }
    .count-card .num { font-size: 1.6rem; font-weight: 900; color: var(--gold-light); line-height: 1; }
    .count-card.cb .num { color: var(--red-glow); }
    .count-card .lbl { font-size: .65rem; color: var(--text-dim); margin-top: 3px; letter-spacing: .05em; }

    .btn-clear {
      width: 100%; padding: 8px; background: rgba(192,57,43,.07);
      border: 1px solid rgba(192,57,43,.2); border-radius: 8px; color: var(--red-glow);
      font-family: inherit; font-size: .76rem; cursor: pointer; transition: all .15s; letter-spacing: .05em;
    }
    .btn-clear:hover { background: rgba(192,57,43,.18); }

    /* === MAIN DRAW PANEL === */
    .main-panel {
      grid-area: main; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 22px;
    }

    /* Slot Machine */
    .slots-machine {
      width: 100%; max-width: 960px;
      background: radial-gradient(ellipse at center, #1e1050 0%, #080516 100%);
      border: 2px solid var(--gold-dim); border-radius: 20px; padding: 20px 20px 22px;
      box-shadow: 0 0 0 1px rgba(212,169,74,.08), 0 0 40px rgba(212,169,74,.1), inset 0 0 60px rgba(0,0,0,.4);
      display: flex; flex-direction: row; gap: 16px;
      position: relative; overflow: hidden;
    }
    .slots-machine::before { content: '✦'; position: absolute; top: 12px; left: 16px; color: var(--gold-dim); opacity: .5; font-size: 1rem; }
    .slots-machine::after  { content: '✦'; position: absolute; bottom: 12px; right: 16px; color: var(--gold-dim); opacity: .5; font-size: 1rem; }
    .slots-machine.secret-active {
      border-color: var(--red);
      box-shadow: 0 0 0 1px rgba(192,57,43,.3), 0 0 30px rgba(192,57,43,.25), inset 0 0 60px rgba(0,0,0,.4);
    }

    .reel-row {
      display: flex; flex-direction: column; flex: 1;
      background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px; overflow: hidden; transition: border-color .3s, box-shadow .3s;
    }
    .reel-row.locked {
      border-color: rgba(212,169,74,.4);
      box-shadow: 0 0 14px rgba(212,169,74,.18), inset 0 0 20px rgba(212,169,74,.05);
    }
    .reel-row.winner-row.locked {
      border-color: var(--gold);
      box-shadow: 0 0 24px rgba(212,169,74,.35), inset 0 0 30px rgba(212,169,74,.08);
    }

    .reel-label {
      display: flex; align-items: center; justify-content: center;
      background: rgba(212,169,74,.06); border-right: none; border-bottom: 1px solid rgba(212,169,74,.12); padding: 8px 0; font-size: 0.8rem;
      color: var(--gold-dim); font-size: .68rem; font-weight: 700;
      letter-spacing: .22em; padding: 0; text-align: center;
      transition: color .3s;
    }
    .reel-row.locked .reel-label { color: var(--gold); }

    .reel-window {
      height: 120px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .reel-value {
      font-size: clamp(1.3rem, 2.6vw, 1.9rem); font-weight: 900;
      color: var(--gold-light); letter-spacing: .06em;
      text-align: center; padding: 0 14px; width: 100%;
    }
    /* Person reel: slightly smaller to fit name + number */
    #reel-person { font-size: clamp(1.1rem, 2.2vw, 1.6rem); }

    .reel-value.idle {
      color: var(--text-dim); font-size: .95rem; font-weight: 300; letter-spacing: .3em;
    }
    .reel-value.spinning {
      filter: blur(2.5px);
      animation: reelShimmer .13s ease-in-out infinite;
    }
    @keyframes reelShimmer {
      0%, 100% { transform: scaleY(1); opacity: 1; }
      50% { transform: scaleY(0.88); opacity: 0.65; }
    }
    .reel-value.locking {
      animation: reelLock .42s cubic-bezier(.36,.07,.19,.97) forwards;
    }
    @keyframes reelLock {
      0%   { transform: translateY(-30px); filter: blur(5px); opacity: .4; }
      55%  { transform: translateY(5px); filter: blur(0); opacity: 1; }
      78%  { transform: translateY(-3px); }
      100% { transform: translateY(0); }
    }
    .reel-row.winner-row.locked .reel-value {
      animation: winnerGlow 1.6s ease-in-out infinite alternate;
    }
    @keyframes winnerGlow {
      from { text-shadow: 0 0 10px rgba(212,169,74,.4); }
      to   { text-shadow: 0 0 28px rgba(245,208,120,.95), 0 0 55px rgba(212,169,74,.45); }
    }

    .confetti-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }

    /* === DRAW CONTROLS === */
    .draw-controls {
      width: 100%; max-width: 960px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .group-switcher { display: flex; gap: 8px; }
    .btn-group {
      padding: 8px 22px; border-radius: 20px;
      border: 1px solid var(--border); background: rgba(255,255,255,.04);
      color: var(--text-dim); font-family: inherit; font-size: .82rem; font-weight: 700;
      cursor: pointer; transition: all .2s; letter-spacing: .08em;
    }
    .btn-group.active-A { background: rgba(212,169,74,.15); border-color: var(--gold); color: var(--gold); box-shadow: 0 0 12px rgba(212,169,74,.2); }
    .btn-group.active-B { background: rgba(192,57,43,.15); border-color: var(--red-glow); color: var(--red-glow); box-shadow: 0 0 12px rgba(192,57,43,.2); }
    .btn-group:not(.active-A):not(.active-B):hover { background: rgba(255,255,255,.08); color: var(--text); }

    .group-badge { font-size: .78rem; color: var(--text-dim); letter-spacing: .08em; }
    .group-badge span { font-weight: 700; color: var(--gold); }
    .group-badge.gb-B span { color: var(--red-glow); }

    .btn-draw {
      position: relative; padding: 18px 56px;
      font-family: inherit; font-size: 1.25rem; font-weight: 900;
      letter-spacing: .2em; color: #fff; border: none; border-radius: 50px; cursor: pointer;
      background: linear-gradient(135deg, var(--red) 0%, #8e1010 50%, var(--red) 100%);
      background-size: 200% 100%;
      box-shadow: 0 4px 30px rgba(192,57,43,.5), inset 0 1px 0 rgba(255,255,255,.15);
      transition: background-position .5s, transform .15s, box-shadow .2s; overflow: hidden;
    }
    .btn-draw::after {
      content: ''; position: absolute; inset: -1px; border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,.08), transparent 50%);
      pointer-events: none;
    }
    .btn-draw:not(:disabled):hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 8px 40px rgba(192,57,43,.7); }
    .btn-draw:active { transform: translateY(0); }
    .btn-draw:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-draw.spinning { animation: pulseDraw 1s ease-in-out infinite; }
    @keyframes pulseDraw {
      0%, 100% { box-shadow: 0 4px 30px rgba(192,57,43,.5); }
      50%       { box-shadow: 0 4px 50px rgba(192,57,43,.9); }
    }

    /* === RECORDS PANEL === */
    .records-panel { grid-area: records; }
    .records-list { display: flex; flex-direction: column; gap: 8px; max-height: calc(100vh - 200px); overflow-y: auto; }
    .records-list::-webkit-scrollbar { width: 4px; }
    .records-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .record-item {
      background: rgba(212,169,74,.06); border: 1px solid rgba(212,169,74,.15);
      border-radius: 10px; padding: 10px 14px;
      animation: recordAppear .5s cubic-bezier(.22,.61,.36,1);
    }
    .record-item.grp-B { background: rgba(192,57,43,.06); border-color: rgba(192,57,43,.2); }
    @keyframes recordAppear { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }
    .record-round { font-size: .67rem; color: var(--text-dim); letter-spacing: .1em; margin-bottom: 3px; }
    .record-name  { font-size: 1rem; font-weight: 700; color: var(--gold-light); }
    .record-detail { font-size: .72rem; color: var(--text-dim); margin-top: 2px; }
    .no-records { color: var(--text-dim); font-size: .82rem; text-align: center; padding: 24px 0; }

    /* === SETTINGS MODAL === */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(5,3,15,.88);
      backdrop-filter: blur(8px); z-index: 5000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: linear-gradient(145deg, #1e1548 0%, #110c30 100%);
      border: 1px solid var(--gold-dim); border-radius: 20px;
      width: 100%; max-width: 600px; max-height: 90vh;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.8), 0 0 0 1px rgba(212,169,74,.06);
      transform: scale(.95) translateY(10px); transition: transform .3s;
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--gold-light); letter-spacing: .1em; }
    .modal-close {
      background: none; border: none; color: var(--text-dim); font-size: 1.4rem;
      cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color .15s, background .15s; line-height: 1;
    }
    .modal-close:hover { color: var(--text); background: rgba(255,255,255,.08); }
    .modal-tabs {
      display: flex; gap: 4px; padding: 12px 24px 0;
      flex-shrink: 0; border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none; border: none; font-family: inherit; font-size: .85rem;
      color: var(--text-dim); padding: 8px 16px; cursor: pointer;
      border-radius: 8px 8px 0 0; transition: all .2s;
      border-bottom: 2px solid transparent; margin-bottom: -1px; letter-spacing: .06em;
    }
    .tab-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(212,169,74,.06); }
    .modal-body { flex: 1; overflow-y: auto; padding: 24px; }
    .modal-body::-webkit-scrollbar { width: 4px; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Secret tab */
    .secret-intro {
      font-size: .82rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 18px;
      padding: 12px 16px; background: rgba(192,57,43,.08); border: 1px solid rgba(192,57,43,.2); border-radius: 10px;
    }
    .secret-intro strong { color: var(--red-glow); }
    .secret-add-form { display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px; margin-bottom: 18px; align-items: end; }
    .field { margin-bottom: 0; }
    .field label { display: block; font-size: .73rem; color: var(--text-dim); margin-bottom: 4px; }
    .field input {
      width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: inherit; font-size: .88rem;
      outline: none; transition: border-color .2s;
    }
    .field input:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 3px rgba(212,169,74,.12); }
    .btn-sm {
      padding: 9px 14px; border: none; border-radius: 8px; font-family: inherit;
      font-size: .8rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .btn-sm.gold { background: linear-gradient(135deg, #8a6820, var(--gold)); color: #1a0a00; }
    .btn-sm.gold:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-sm.red { background: rgba(192,57,43,.2); border: 1px solid rgba(192,57,43,.4); color: var(--red-glow); }
    .btn-sm.red:hover { background: rgba(192,57,43,.35); }
    .secret-list-table { width: 100%; border-collapse: collapse; }
    .secret-list-table th { text-align: left; font-size: .7rem; color: var(--text-dim); letter-spacing: .12em; padding: 6px 10px; border-bottom: 1px solid var(--border); }
    .secret-list-table td { padding: 9px 10px; font-size: .86rem; border-bottom: 1px solid rgba(255,255,255,.04); }
    .secret-list-table tr:last-child td { border-bottom: none; }
    .secret-empty { text-align: center; color: var(--text-dim); font-size: .82rem; padding: 24px 0; }

    /* Sound tab */
    .sound-settings { display: flex; flex-direction: column; gap: 16px; }
    .sound-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 15px; background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 10px;
    }
    .sound-item-info strong { display: block; font-size: .9rem; color: var(--text); margin-bottom: 2px; }
    .sound-item-info span  { font-size: .75rem; color: var(--text-dim); }
    .toggle { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: rgba(255,255,255,.1); border-radius: 13px; cursor: pointer; transition: background .25s; }
    .toggle-slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: var(--text-dim); border-radius: 50%; transition: transform .25s, background .25s; }
    .toggle input:checked + .toggle-slider { background: rgba(212,169,74,.35); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); background: var(--gold); }
    .volume-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .volume-row span { font-size: .75rem; color: var(--text-dim); width: 30px; }
    input[type=range] { flex: 1; -webkit-appearance: none; height: 4px; background: var(--border); border-radius: 2px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--gold); border-radius: 50%; cursor: pointer; }

    /* === CORNER BUTTONS === */
    .corner-btn { position: fixed; width: 80px; height: 120px; background: transparent; border: none; cursor: pointer; z-index: 9999; opacity: 0; }
    #corner-bl { bottom: 0; left: 0; }
    #corner-br { bottom: 0; right: 0; }

    /* === TOAST === */
    #toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20,12,40,.95); border: 1px solid var(--gold-dim);
      border-radius: 10px; padding: 10px 22px; color: var(--text);
      font-size: .85rem; letter-spacing: .06em;
      pointer-events: none; opacity: 0; transition: opacity .3s, transform .3s; z-index: 10000;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<button id="corner-bl" class="corner-btn" aria-hidden="true" tabindex="-1"></button>
<button id="corner-br" class="corner-btn" aria-hidden="true" tabindex="-1"></button>
<div id="toast"></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h2>⚙ 設定</h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-tabs">
      <button class="tab-btn active" data-tab="tab-secret">🔒 黑箱名單</button>
      <button class="tab-btn" data-tab="tab-sound">🔊 音效設定</button>
    </div>
    <div class="modal-body">
      <!-- TAB: Secret List -->
      <div class="tab-pane active" id="tab-secret">
        <div class="secret-intro">
          <strong>黑箱模式說明：</strong><br>
          此名單僅在黑箱模式啟動時生效。觸發方式：先點左下角 → 3 秒內點右下角。抽獎動畫與一般模式完全一致。
        </div>
        <div class="secret-add-form">
          <div class="field"><label>姓名</label><input id="s-name" type="text" placeholder="姓名" /></div>
          <div class="field"><label>區域</label><input id="s-zone" type="text" placeholder="區域" style="width:80px" /></div>
          <div class="field"><label>桌號</label><input id="s-table" type="text" placeholder="桌號" style="width:80px" /></div>
          <div class="field"><label>號碼</label><input id="s-number" type="text" placeholder="號碼" style="width:80px" /></div>
          <button class="btn-sm gold" id="s-add" style="align-self:flex-end">＋</button>
        </div>
        <div id="secret-list-container"></div>
      </div>
      <!-- TAB: Sound -->
      <div class="tab-pane" id="tab-sound">
        <div class="sound-settings">
          <div class="sound-item">
            <div class="sound-item-info"><strong>滾動音效</strong><span>抽獎過程中的 tick 節拍聲</span></div>
            <label class="toggle"><input type="checkbox" id="toggle-tick" checked /><span class="toggle-slider"></span></label>
          </div>
          <div class="sound-item">
            <div class="sound-item-info"><strong>得獎音效</strong><span>中獎瞬間的勝利號角</span></div>
            <label class="toggle"><input type="checkbox" id="toggle-fanfare" checked /><span class="toggle-slider"></span></label>
          </div>
          <div class="sound-item" style="flex-direction:column; align-items:flex-start; gap:10px">
            <div class="sound-item-info"><strong>音量</strong><span>調整所有音效音量</span></div>
            <div class="volume-row" style="width:100%">
              <span>🔈</span>
              <input type="range" id="volume-slider" min="0" max="100" value="70" />
              <span id="volume-display" style="width:36px">70%</span>
            </div>
          </div>
          <div class="sound-item">
            <div class="sound-item-info"><strong>試聽</strong><span>預覽各音效效果</span></div>
            <div style="display:flex; gap:8px">
              <button class="btn-sm gold" onclick="previewTick()">Tick</button>
              <button class="btn-sm gold" onclick="previewFanfare()">Fanfare</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Main App -->
<div class="app">

  <!-- Header -->
  <header class="panel">
    <div class="header-ornament"></div>
    <div class="header-title">
      <h1>✦ 春 酒 抽 獎 ✦</h1>
      <p>LUCKY DRAW · 年度春酒</p>
    </div>
    <div class="header-ornament"></div>
    <button class="btn-fullscreen" id="btn-fullscreen" title="全螢幕 (快捷鍵 F)">⛶</button>
    <button class="btn-settings" id="btn-open-settings" title="設定">⚙</button>
  </header>

  <!-- Import Panel -->
  

  <!-- Main Draw -->
  <main class="main-panel panel">

    <div class="slots-machine" id="slots-machine">
      <div class="confetti-layer" id="confetti-layer"></div>

      <div class="reel-row" id="reel-row-zone">
        <div class="reel-label">區&nbsp;&nbsp;域</div>
        <div class="reel-window"><div class="reel-value idle" id="reel-zone">請匯入名單</div></div>
      </div>

      <div class="reel-row" id="reel-row-table">
        <div class="reel-label">桌&nbsp;&nbsp;次</div>
        <div class="reel-window"><div class="reel-value idle" id="reel-table">請匯入名單</div></div>
      </div>

      <div class="reel-row winner-row" id="reel-row-person">
        <div class="reel-label">得 獎 者</div>
        <div class="reel-window"><div class="reel-value idle" id="reel-person">準 備 開 獎</div></div>
      </div>
    </div>

    <div class="draw-controls">
      
      
      <button class="btn-draw" id="btn-draw">開 始 抽 獎</button>
    </div>

  </main>

  <!-- Records -->
  <aside class="records-panel panel">
    <h2 class="panel-heading">中獎紀錄</h2>
    <div class="records-list" id="records-list">
      <div class="no-records">尚無中獎紀錄</div>
    </div>
  </aside>

</div>

// ============================================================
//  CSV PARSER
// ============================================================
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return [];

  const sep = lines[0].includes('\t') ? '\t' : ',';
  const rows = lines.map(l => l.split(sep).map(c => c.trim().replace(/^["']|["']$/g, '')));
  const headerRow = rows[0].map(h => h.toLowerCase());

  function findCol(kws) {
    for (const kw of kws) {
      const i = headerRow.findIndex(h => h.includes(kw));
      if (i >= 0) return i;
    }
    return -1;
  }

  const cZone   = findCol(['區域','zone','area','廳','區']);
  const cTable  = findCol(['桌號','桌次','table','桌']);
  const cNumber = findCol(['號碼','座號','編號','票號','number','no','id','seat']);
  const cName   = findCol(['姓名','name','名字','人名']);

  const hasHeader = [cZone, cTable, cNumber, cName].some(c => c >= 0);
  const start = hasHeader ? 1 : 0;

  const gz = hasHeader && cZone   >= 0 ? r => r[cZone]   : r => r[0] || '';
  const gt = hasHeader && cTable  >= 0 ? r => r[cTable]  : r => r[1] || '';
  const gn = hasHeader && cNumber >= 0 ? r => r[cNumber] : r => r[2] || '';
  const gm = hasHeader && cName   >= 0 ? r => r[cName]   : r => r[3] || '';

  return rows.slice(start).map(r => ({
    zone: gz(r), table: gt(r), number: gn(r), name: gm(r),
  })).filter(p => p.name.trim());
}

function getPool() {
  if (secretReady && secretList.length) return secretList;
  return currentGroup === 'A' ? groupA : groupB;
}

function startDraw() {
  if (isSpinning) return;
  const pool = getPool();
  if (!pool.length) {
    showToast(currentGroup === 'A' ? '請先匯入群A來賓名單' : '請先匯入群B從業人員名單');
    return;
  }

  getAudioCtx();
  isSpinning = true;
  const btn = document.getElementById('btn-draw');
  btn.disabled = true;
  btn.classList.add('spinning');

  const winner = pool[Math.floor(Math.random() * pool.length)];

  const zones   = [...new Set(pool.map(p => p.zone).filter(Boolean))];
  const tables  = [...new Set(pool.map(p => p.table).filter(Boolean))];
  const persons = pool.map(p => p.name + (p.number ? '　#' + p.number : ''));

  if (!zones.length)  zones.push('－');
  if (!tables.length) tables.push('－');

  const LOCK_AT = [1600, 2700, 3900];
  const reelDefs = [
    { id: 'reel-zone',   rowId: 'reel-row-zone',   pool: zones,   final: winner.zone  || '－' },
    { id: 'reel-table',  rowId: 'reel-row-table',  pool: tables,  final: winner.table || '－' },
    { id: 'reel-person', rowId: 'reel-row-person', pool: persons, final: winner.name + (winner.number ? '　#' + winner.number : '') },
  ];

  reelDefs.forEach(r => {
    const el  = document.getElementById(r.id);
    const row = document.getElementById(r.rowId);
    el.className = 'reel-value spinning';
    row.classList.remove('locked');
    el.textContent = r.pool[0];
  });

  const t0 = Date.now();

  reelDefs.forEach((reel, idx) => {
    const el  = document.getElementById(reel.id);
    const row = document.getElementById(reel.rowId);
    let i = 0;

    function tick() {
      const elapsed = Date.now() - t0;
      if (elapsed >= LOCK_AT[idx]) {
        el.textContent = reel.final;
        el.className = 'reel-value locking';
        row.classList.add('locked');
        playSlowTick();

        setTimeout(() => {
          el.className = 'reel-value';
          if (idx === 2) {
            // Last reel — winner!
            row.classList.add('winner-row');
            launchConfetti();
            playFanfare();
            addRecord(winner);
            if (secretReady) {
              secretReady = false;
              document.getElementById('slots-machine').classList.remove('secret-active');
            }
            setTimeout(() => {
              btn.disabled = false;
              btn.classList.remove('spinning');
              isSpinning = false;
            }, 800);
          }
        }, 480);
        return;
      }

      el.textContent = reel.pool[i % reel.pool.length];
      i++;
      const progress = elapsed / LOCK_AT[idx];
      const interval = 55 + progress * 280;
      setTimeout(tick, interval);
    }
    tick();
  });
}

// ============================================================
//  SOUND ENGINE
// ============================================================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTick(pitch = 800) {
  if (!soundEnabled.tick) return;
  try {
    const ctx = getAudioCtx(), t = ctx.currentTime;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(masterVolume * 0.35, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);
    gain.connect(ctx.destination);
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 3);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = pitch; bp.Q.value = 2.5;
    src.connect(bp); bp.connect(gain); src.start(t);
  } catch(e) {}
}
function playSlowTick() {
  if (!soundEnabled.tick) return;
  try {
    const ctx = getAudioCtx(), t = ctx.currentTime;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(masterVolume * 0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    gain.connect(ctx.destination);
    const osc = ctx.createOscillator(); osc.type = 'triangle';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(80, t + 0.12);
    osc.connect(gain); osc.start(t); osc.stop(t + 0.13);
  } catch(e) {}
}
function playFanfare() {
  if (!soundEnabled.fanfare) return;
  try {
    const ctx = getAudioCtx(), t = ctx.currentTime;
    const notes=[523.25,659.25,783.99,1046.5], delays=[0,.12,.22,.35], durs=[.4,.35,.35,.9];
    notes.forEach((freq,i) => {
      const s=t+delays[i], d=durs[i];
      const g=ctx.createGain(); g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(masterVolume*.45,s+.02); g.gain.exponentialRampToValueAtTime(.0001,s+d); g.connect(ctx.destination);
      const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=freq; o.connect(g); o.start(s); o.stop(s+d+.05);
      const g2=ctx.createGain(); g2.gain.setValueAtTime(0,s); g2.gain.linearRampToValueAtTime(masterVolume*.1,s+.02); g2.gain.exponentialRampToValueAtTime(.0001,s+d*.7); g2.connect(ctx.destination);
      const o2=ctx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2; o2.connect(g2); o2.start(s); o2.stop(s+d);
    });
    [523.25,659.25,783.99].forEach(freq => {
      const s=t+.5, g=ctx.createGain();
      g.gain.setValueAtTime(masterVolume*.25,s); g.gain.exponentialRampToValueAtTime(.0001,s+1.4); g.connect(ctx.destination);
      const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=freq; o.connect(g); o.start(s); o.stop(s+1.5);
    });
  } catch(e) {}
}
function previewTick()    { playTick(900); }
function previewFanfare() { playFanfare(); }

// ============================================================
//  STARFIELD
// ============================================================
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let stars    = [];
  function resize() {
    canvas.width = innerWidth; canvas.height = innerHeight;
    stars = Array.from({ length: 200 }, () => ({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + .2, a: Math.random(), s: Math.random() * .008 + .002,
    }));
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.s;
      const alpha = (Math.sin(s.a) + 1) / 2 * .7 + .1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(212,169,74,${alpha})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  addEventListener('resize', resize); resize(); draw();
})();

let toastTimer;
function showToast(msg, dur = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

//  MODAL
// ============================================================
function openModal()  { renderSecretList(); document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('btn-open-settings').addEventListener('click', openModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});
document.getElementById('toggle-tick').addEventListener('change',    e => { soundEnabled.tick    = e.target.checked; });
document.getElementById('toggle-fanfare').addEventListener('change', e => { soundEnabled.fanfare = e.target.checked; });
document.getElementById('volume-slider').addEventListener('input',   e => {
  masterVolume = e.target.value / 100;
  document.getElementById('volume-display').textContent = e.target.value + '%';
});

document.getElementById('corner-bl').addEventListener('click', () => {
  leftClicked = true;
  clearTimeout(leftClickTimer);
  leftClickTimer = setTimeout(() => { leftClicked = false; }, 3000);
});
document.getElementById('corner-br').addEventListener('click', () => {

});

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
